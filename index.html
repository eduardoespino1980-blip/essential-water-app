<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essential Water</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--p:#7C3AED;--pd:#5B21B6;--pl:#EDE9FE;--g50:#F9FAFB;--g200:#E5E7EB;--g400:#9CA3AF;--g600:#4B5563;--g800:#1F2937;--green:#10B981;--red:#EF4444;--amber:#F59E0B}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--g50);color:var(--g800);min-height:100vh}
.hidden{display:none!important}
#login-screen{min-height:100vh;background:linear-gradient(135deg,var(--pd),var(--p));display:flex;align-items:center;justify-content:center;padding:20px}
.lcard{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:360px;box-shadow:0 20px 40px rgba(0,0,0,.2)}
.logo{text-align:center;margin-bottom:28px}
.logo-circle{width:60px;height:60px;background:var(--p);border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center}
.logo-circle svg{width:28px;height:28px;fill:#fff}
.logo h1{font-size:20px;font-weight:700}
.logo p{font-size:12px;color:var(--g400);margin-top:3px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--g600);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border:2px solid #C4B5FD;border-radius:10px;font-size:15px;font-family:'Inter',sans-serif;background:#FAFAFE;color:var(--g800);box-shadow:0 1px 3px rgba(124,58,237,.08)}
.field select{background:#F5F3FF;cursor:pointer;appearance:auto}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--p);background:#fff;box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.lerr{background:#FEE2E2;color:#991B1B;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;display:none}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-p{background:var(--p);color:#fff}
.btn-p:hover{background:var(--pd)}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.topbar{background:var(--p);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tb-left{display:flex;align-items:center;gap:8px}
.tb-logo{width:30px;height:30px;background:rgba(255,255,255,.2);border-radius:7px;display:flex;align-items:center;justify-content:center}
.tb-logo svg{width:16px;height:16px;fill:#fff}
.tb-title{font-size:14px;font-weight:700}
.tb-right{display:flex;align-items:center;gap:8px}
.ubadge{background:rgba(255,255,255,.2);border-radius:16px;padding:4px 10px;font-size:11px;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-out{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:7px;padding:6px 10px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif}
.content{padding:16px;max-width:580px;margin:0 auto;padding-bottom:80px}
.stitle{font-size:17px;font-weight:700;margin-bottom:14px}
.subtle{font-size:12px;color:var(--g400);margin:-8px 0 12px}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.tbox{background:var(--pl);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.tbox-l{font-size:12px;font-weight:600;color:var(--pd)}
.tbox-v{font-size:20px;font-weight:700;color:var(--pd)}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500;margin-bottom:12px;display:none}
.alert-ok{background:#D1FAE5;color:#065F46}
.alert-err{background:#FEE2E2;color:#991B1B}
.litem{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.05);display:flex;justify-content:space-between;align-items:center;gap:12px}
.litem-info{flex:1;min-width:0}
.litem-info h4{font-size:13px;font-weight:600}
.litem-info p{font-size:11px;color:var(--g400);margin-top:2px;line-height:1.35}
.litem-r{text-align:right;flex-shrink:0}
.litem-r .amt{font-size:14px;font-weight:700;color:var(--pd)}
.badge{display:inline-block;padding:3px 9px;border-radius:16px;font-size:10px;font-weight:700}
.b-green{background:#D1FAE5;color:#065F46}.b-red{background:#FEE2E2;color:#991B1B}
.b-amber{background:#FEF3C7;color:#92400E}.b-purple{background:var(--pl);color:var(--pd)}
.b-gray{background:var(--g200);color:var(--g600)}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mcard{background:#fff;border-radius:12px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);border-left:3px solid var(--p)}
.mcard-l{font-size:10px;color:var(--g400);font-weight:500;text-transform:uppercase;margin-bottom:3px}
.mcard-v{font-size:19px;font-weight:700}
.mixto-box{background:var(--g50);border:1.5px dashed var(--p);border-radius:10px;padding:12px;margin-bottom:12px;display:none}
.mlabel{font-size:11px;font-weight:700;color:var(--pd);margin-bottom:8px;text-transform:uppercase}
.bnav{background:#fff;border-top:1px solid var(--g200);display:flex;position:fixed;bottom:0;left:0;right:0;z-index:100;overflow-x:auto}
.nitem{flex:1;min-width:60px;display:flex;flex-direction:column;align-items:center;padding:9px 4px;cursor:pointer;color:var(--g400);border:none;background:none;font-family:'Inter',sans-serif}
.nitem.active{color:var(--p)}
.nitem svg{width:20px;height:20px;margin-bottom:2px}
.nitem span{font-size:10px;font-weight:500}
.loading{text-align:center;padding:32px;color:var(--g400);font-size:13px}
.spin{width:28px;height:28px;border:3px solid var(--g200);border-top-color:var(--p);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:7px;width:auto;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-gray{background:var(--g200);color:var(--g800)}
.btn-amber{background:var(--amber);color:#fff}
.tabs-mini{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.tabmini{padding:8px 14px;border:1px solid var(--g200);background:#fff;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.tabmini.active{background:var(--pl);border-color:var(--p);color:var(--pd)}
.bar{height:8px;background:var(--g200);border-radius:999px;overflow:hidden;margin-top:6px}
.bar > span{display:block;height:100%;background:var(--p);border-radius:999px}
.sale-lines{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.sale-line{border:1px solid var(--g200);border-radius:12px;padding:10px;background:#fff}
.sale-line-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sale-line-title{font-size:11px;font-weight:700;color:var(--pd);text-transform:uppercase}
.mini-btn{border:none;background:var(--g200);color:var(--g800);border-radius:8px;padding:8px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.mini-btn.red{background:#FEE2E2;color:#991B1B}
.mini-btn.green{background:#D1FAE5;color:#065F46}
.row-actions{display:flex;gap:8px;flex-wrap:wrap}
.note{font-size:11px;color:var(--g400)}
.sep{border:none;border-top:1px solid var(--g200);margin:14px 0}
.date-range{display:flex;gap:8px;align-items:flex-end;margin-bottom:14px}
.date-range .field{flex:1;margin-bottom:0}
.date-range .btn-sm{align-self:flex-end;margin-bottom:1px}
table.dtable{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.dtable th{text-align:left;padding:6px 8px;background:var(--pl);color:var(--pd);font-size:10px;text-transform:uppercase;font-weight:700}
.dtable td{padding:6px 8px;border-bottom:1px solid var(--g200)}
.dtable tr:last-child td{border-bottom:none}
@media(min-width:600px){.content{padding:20px;padding-bottom:80px}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="lcard">
    <div class="logo">
      <div class="logo-circle"><svg viewBox="0 0 24 24"><path d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2C20 10.48 17.33 6.55 12 2z"/></svg></div>
      <h1>Essential Water</h1>
      <p>Sistema de gesti&oacute;n v7.0</p>
    </div>
    <div class="lerr" id="lerr"></div>
    <div class="field"><label>Usuario</label><input type="text" id="inp-user" placeholder="Tu usuario" autocomplete="username"></div>
    <div class="field"><label>Clave</label><input type="password" id="inp-pass" placeholder="6 d&iacute;gitos" maxlength="6" autocomplete="current-password"></div>
    <button class="btn btn-p" id="btn-login">Ingresar</button>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-logo"><svg viewBox="0 0 24 24"><path d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2C20 10.48 17.33 6.55 12 2z"/></svg></div>
      <span class="tb-title">Essential Water</span>
    </div>
    <div class="tb-right">
      <span class="ubadge" id="ubadge"></span>
      <button class="btn-out" id="btn-refresh" title="Actualizar datos" style="padding:6px 8px;font-size:14px;line-height:1">&#x21bb;</button>
      <button class="btn-out" id="btn-logout">Salir</button>
    </div>
  </div>
  <div class="content" id="content"><div class="loading"><div class="spin"></div>Cargando...</div></div>
  <nav class="bnav" id="bnav"></nav>
</div>

<div class="modal-ov hidden" id="modal-generic">
  <div class="modal"><h3 id="modal-title"></h3><div id="modal-body"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===================== SUPABASE INIT =====================
const SB_URL='https://kemxqcciiozeqagjaiae.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtlbXhxY2NpaW96ZXFhZ2phaWFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNTgwNTAsImV4cCI6MjA5MDgzNDA1MH0.LufzfvfjxoRmq7IdSjEWXCl-ZokT9v4h88PmHz6JMjM';
const SB=supabase.createClient(SB_URL,SB_KEY);

// Helper: ejecutar consulta con paginacion automatica (Supabase tope 1000 filas por request)
async function fetchAll(queryBuilder){
  const PAGE=1000;let all=[];let from=0;let done=false;
  while(!done){
    const{data,error}=await queryBuilder.range(from,from+PAGE-1);
    if(error){console.error('fetchAll error',error);break;}
    if(!data||!data.length){done=true;break;}
    all=all.concat(data);
    if(data.length<PAGE)done=true;
    else from+=PAGE;
    if(from>50000)break; // safety cap
  }
  return all;
}

// ===================== GLOBALS =====================
let U=null;
let D={clientes:[],productos:[],empleados:[],proveedores:[],currentTab:'ventas'};
const CATS=['Diesel','Gasolina','Almuerzos','Insumos Producci\u00f3n','Adelanto Empleado','Fondo Diario','Mantenimiento Planta','Salarios','Alquiler','Botellones','Botellitas 600 ml','Galones','Mantenimiento Veh\u00edculo','Otros'];

// ===================== UTILS =====================
function g(id){return document.getElementById(id);}
function fmt(n){return '$'+parseFloat(n||0).toFixed(2);}
function hoy(){return new Date().toISOString().split('T')[0];}
function uid(p){return p+'-'+Date.now().toString(36).toUpperCase()+Math.random().toString(36).slice(2,5).toUpperCase();}
function parseNum(v){return parseFloat(v||0)||0;}
function round2(n){return Math.round((parseFloat(n||0)||0)*100)/100;}
function roleLabel(r){return r==='admin'?'Admin':(r==='super'||r==='supervisor')?'Super':'Vendedor';}
function isAdmin(){return U&&(U.rol==='admin'||U.rol==='super'||U.rol==='supervisor');}
function showAlert(id,msg,ok){var e=g(id);if(!e)return;e.textContent=msg;e.className='alert '+(ok?'alert-ok':'alert-err');e.style.display='block';setTimeout(()=>{e.style.display='none';},ok?3500:5000);}
function lockBtn(b,t){if(!b||b.disabled)return false;b.disabled=true;b._ot=b.textContent;b.textContent=t||'Guardando...';return true;}
function unlockBtn(b){if(!b)return;b.disabled=false;if(b._ot)b.textContent=b._ot;}
function openModal(title,html){g('modal-title').textContent=title;g('modal-body').innerHTML=html;g('modal-generic').classList.remove('hidden');}
function closeModal(){g('modal-generic').classList.add('hidden');}
function fmtDate(d){if(!d)return'';return new Date(d+'T12:00:00').toLocaleDateString('es-EC');}
function describeItems(items){return items.map(i=>{let p=D.productos.find(x=>x.id===i.producto_id);let nm=p?p.nombre:i.producto_id;return nm+' x'+parseNum(i.cantidad)+(i.forma_pago==='Regal\u00edas'?' (Regal\u00eda)':'');}).join(' \u00b7 ');}

// close modal on overlay click
document.addEventListener('click',e=>{if(e.target.classList.contains('modal-ov'))closeModal();});

// ===================== AUTH =====================
g('btn-login').onclick=async()=>{
  let user=g('inp-user').value.trim(),pass=g('inp-pass').value.trim(),err=g('lerr');
  if(!user||!pass){err.textContent='Ingresa usuario y clave';err.style.display='block';return;}
  err.style.display='none';
  let btn=g('btn-login');btn.disabled=true;btn.textContent='Verificando...';
  try{
    const{data,error}=await SB.from('empleados').select('*').eq('usuario',user).eq('clave',pass).eq('activo',true).single();
    if(error||!data){err.textContent='Usuario o clave incorrectos';err.style.display='block';return;}
    U={id:data.id,nombre:data.nombre,rol:data.rol,usuario:data.usuario};
    g('login-screen').classList.add('hidden');g('app').classList.remove('hidden');
    g('ubadge').textContent=(U.nombre||U.usuario)+' \u00b7 '+roleLabel(U.rol);
    await loadBase();buildNav();showTab('ventas');
  }catch(ex){err.textContent='Error de conexi\u00f3n';err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='Ingresar';}
};
g('inp-pass').onkeydown=e=>{if(e.key==='Enter')g('btn-login').click();};
g('inp-user').onkeydown=e=>{if(e.key==='Enter')g('inp-pass').focus();};
g('btn-logout').onclick=()=>{U=null;g('app').classList.add('hidden');g('login-screen').classList.remove('hidden');g('inp-user').value='';g('inp-pass').value='';};
g('btn-refresh').onclick=()=>{loadBase().then(()=>renderCurrentTab());};

// ===================== DATA LOADING =====================
async function loadBase(){
  const[c,p,e,pr]=await Promise.all([
    SB.from('clientes').select('*').order('nombre'),
    SB.from('productos').select('*').order('nombre'),
    SB.from('empleados').select('*').order('nombre'),
    SB.from('proveedores').select('*').order('nombre')
  ]);
  D.clientes=c.data||[];D.productos=p.data||[];D.empleados=e.data||[];D.proveedores=pr.data||[];
}

// ===================== NAV =====================
function buildNav(){
  const tabs=[
    {id:'ventas',label:'Ventas',icon:'M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-8.9-5h9.45c.75 0 1.41-.41 1.75-1.03l3.24-5.88A1 1 0 0020.66 5H5.21L4.27 3H1v2h2l3.6 7.59L5.25 15c-.22.38-.25.83-.25 1 0 1.1.9 2 2 2h12v-2H7.42c-.13 0-.25-.11-.25-.25l.03-.12.9-1.63z'}
  ];
  if(isAdmin()){
    tabs.push({id:'gastos',label:'Gastos',icon:'M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z'});
    tabs.push({id:'clientes',label:'Clientes',icon:'M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z'});
    tabs.push({id:'proveedores',label:'Prov.',icon:'M19 7h-3V6a4 4 0 00-8 0v1H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2zm-9-1a2 2 0 114 0v1h-4V6zm9 12H5V9h14v9z'});
    tabs.push({id:'cxc',label:'CXC',icon:'M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z'});
    tabs.push({id:'cxp',label:'CXP',icon:'M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z'});
    tabs.push({id:'caja',label:'Caja',icon:'M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z'});
    tabs.push({id:'dashboard',label:'Dash',icon:'M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z'});
    if(U.rol==='admin') tabs.push({id:'usuarios',label:'Usuarios',icon:'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'});
  }
  tabs.push({id:'ayuda',label:'Ayuda',icon:'M11 18h2v-2h-2v2zm1-16C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-2.21 0-4 1.79-4 4h2c0-1.1.9-2 2-2s2 .9 2 2c0 2-3 1.75-3 5h2c0-2.25 3-2.5 3-5 0-2.21-1.79-4-4-4z'});
  const nav=g('bnav');nav.innerHTML='';
  tabs.forEach(t=>{
    let b=document.createElement('button');b.className='nitem';b.id='nav-'+t.id;
    b.innerHTML=`<svg viewBox="0 0 24 24" fill="currentColor"><path d="${t.icon}"/></svg><span>${t.label}</span>`;
    b.onclick=()=>showTab(t.id);nav.appendChild(b);
  });
}

function showTab(id){
  D.currentTab=id;
  document.querySelectorAll('.nitem').forEach(b=>b.classList.remove('active'));
  let nb=g('nav-'+id);if(nb)nb.classList.add('active');
  g('content').innerHTML='<div class="loading"><div class="spin"></div>Cargando...</div>';
  setTimeout(()=>{renderCurrentTab();},50);
}
function renderCurrentTab(){
  let id=D.currentTab;
  if(id==='ventas')renderVentas();
  else if(id==='gastos')renderGastos();
  else if(id==='clientes')renderClientes();
  else if(id==='proveedores')renderProveedores();
  else if(id==='cxc')renderCXC();
  else if(id==='cxp')renderCXP();
  else if(id==='caja')renderCaja();
  else if(id==='dashboard')renderDashboard();

  c.innerHTML=`

      </div>

      <div class="row-actions"><button class="mini-btn" id="btn-add-line">+ Agregar producto</button></div>
      <div class="grid2" style="margin-top:12px">
        <div class="tbox"><span class="tbox-l">Unidades</span><span class="tbox-v" id="vunits">0</span></div>
        <div class="tbox"><span class="tbox-l">Total</span><span class="tbox-v" id="vtotal">$0.00</span></div>

      <div class="field"><label>Hasta</label><input type="date" id="vhh" value="${hoy()}"></div>

  `;

  // Sale lines builder
  let lines=[{productoId:'',qty:1,precio:0,tipo:'Venta'}];
  function paintLines(){renderSaleLines('venta-lines',lines,true,recalc);}
  function recalc(){
    let total=0,units=0;
    document.querySelectorAll('#venta-lines .sale-line').forEach(sl=>{
      let q=parseNum(sl.querySelector('.line-qty').value),p=parseNum(sl.querySelector('.line-price').value);
      sl.querySelector('.line-total').textContent=fmt(q*p);
    });
    let items=collectLines('venta-lines');
    items.forEach(i=>{total+=i.qty*i.precio;units+=i.qty;});

    let forma=g('vcond').value;
    g('vmixto').style.display=forma==='Mixto'?'block':'none';
    if(forma==='Cr\u00e9dito'&&g('vcr'))g('vcr').value=total.toFixed(2);
    else if(forma==='Mixto'&&g('vcr'))g('vcr').value=Math.max(0,total-parseNum(g('vef').value)-parseNum(g('vtr').value)-parseNum(g('vch').value)).toFixed(2);
  }
  paintLines();
  g('btn-add-line').onclick=()=>{lines.push({productoId:'',qty:1,precio:0,tipo:'Venta'});paintLines();recalc();};
  g('vcond').onchange=recalc;
  ['vef','vtr','vch'].forEach(id=>{let el=g(id);if(el)el.oninput=recalc;});

  // Auto-fill price when client selected
  g('vc').onchange=()=>{

  g('btn-venta').onclick=async()=>{
    let f=g('vf').value,cliId=g('vc').value,forma=g('vcond').value,obs=g('vobs').value.trim();
    let items=collectLines('venta-lines');
    if(!f||!cliId||!items.length){showAlert('av','Completa fecha, cliente y al menos un producto.',false);return;}
    let cli=D.clientes.find(c=>c.id===cliId);
    let btn=g('btn-venta');if(!lockBtn(btn))return;
    try{
      let saleId=uid('V');
      let totalSale=items.reduce((s,i)=>s+i.qty*i.precio,0);
      let creditoSale=0;
      if(forma==='Cr\u00e9dito')creditoSale=totalSale;
      else if(forma==='Mixto')creditoSale=Math.max(0,totalSale-parseNum(g('vef').value)-parseNum(g('vtr').value)-parseNum(g('vch').value));
      // distribute saldo
      let bases=items.map(i=>({total:i.tipo==='Regal\u00eda'||forma==='Regal\u00edas'?0:i.qty*i.precio}));
      let saldos=distributeSaldo(bases,creditoSale);
      let rows=items.map((i,idx)=>({
        venta_id:saleId,fecha:f,cliente_id:cliId,cliente_nombre:cli.nombre,empleado_id:U.id,
        producto_id:i.productoId,cantidad:i.qty,precio:i.precio,total:round2(i.qty*i.precio),
        forma_pago:(i.tipo==='Regal\u00eda'||forma==='Regal\u00edas')?'Regal\u00edas':forma,
        saldo:saldos[idx],observacion:(i.tipo==='Regal\u00eda'?'[Regal\u00eda] ':'')+obs,
        usuario:U.usuario,eliminada:false
      }));
      const{error}=await SB.from('ventas_detalle').insert(rows);
      if(error)throw error;
      showAlert('av','Venta guardada '+fmt(totalSale),true);
      lines=[{productoId:'',qty:1,precio:0,tipo:'Venta'}];paintLines();
      g('vc').value='';g('vobs').value='';g('vcond').value='Contado';recalc();
      loadVentasHist();
    }catch(ex){showAlert('av','Error: '+ex.message,false);}
    finally{unlockBtn(btn);}
  };

  g('btn-vhist').onclick=()=>loadVentasHist();
  loadVentasHist();
}

function distributeSaldo(bases,creditoSale){
  let total=bases.reduce((s,b)=>s+b.total,0);
  let left=creditoSale,out=[];
  for(let i=0;i<bases.length;i++){
    if(bases[i].total>0&&total>0){
      if(i===bases.length-1)out.push(Math.max(0,round2(left)));
      else{let s=round2(creditoSale*(bases[i].total/total));out.push(s);left=round2(left-s);}
    }else out.push(0);
  }
  return out;
}

async function loadVentasHist(){
  let el=g('vhist-list');if(!el)return;
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  let desde=g('vhd')?g('vhd').value:hoy(),hasta=g('vhh')?g('vhh').value:hoy();
  let q=SB.from('ventas_detalle').select('*').eq('eliminada',false).gte('fecha',desde).lte('fecha',hasta).order('fecha',{ascending:false});
  if(U.rol==='vendedor')q=q.eq('usuario',U.usuario);
  let rows=await fetchAll(q);
  // group by venta_id
  let map={};
  rows.forEach(r=>{
    if(!map[r.venta_id])map[r.venta_id]={id:r.venta_id,fecha:r.fecha,cliente_nombre:r.cliente_nombre,cliente_id:r.cliente_id,total:0,saldo:0,items:[],usuario:r.usuario};
    map[r.venta_id].items.push(r);map[r.venta_id].total+=parseNum(r.total);map[r.venta_id].saldo+=parseNum(r.saldo);
  });
  let groups=Object.values(map).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  if(!groups.length){el.innerHTML='<p style="text-align:center;color:var(--g400);padding:20px;font-size:13px">Sin ventas en este periodo</p>';return;}
  el.innerHTML=groups.map(s=>{
    let desc=describeItems(s.items);
    let acts=isAdmin()?`<div style="margin-top:6px;display:flex;gap:6px"><button class="btn-sm btn-gray ed-sale" data-id="${s.id}">Editar</button><button class="btn-sm btn-red del-sale" data-id="${s.id}">Eliminar</button></div>`:'';
    return `<div class="litem"><div class="litem-info"><h4>${s.cliente_nombre}</h4><p>${fmtDate(s.fecha)} \u00b7 ${desc}</p></div><div class="litem-r"><div class="amt">${fmt(s.total)}</div><span class="badge ${s.saldo>0.01?'b-red':'b-green'}">${s.saldo>0.01?'Saldo '+fmt(s.saldo):'Pagado'}</span>${acts}</div></div>`;
  }).join('');
  el.querySelectorAll('.ed-sale').forEach(b=>b.onclick=()=>editSaleModal(b.dataset.id));
  el.querySelectorAll('.del-sale').forEach(b=>b.onclick=()=>deleteSale(b.dataset.id));
}

async function editSaleModal(ventaId){
  const{data}=await SB.from('ventas_detalle').select('*').eq('venta_id',ventaId).eq('eliminada',false);
  if(!data||!data.length)return;
  let first=data[0];
  let items=data.map(r=>({productoId:r.producto_id,qty:parseNum(r.cantidad),precio:parseNum(r.precio),tipo:r.forma_pago==='Regal\u00edas'?'Regal\u00eda':'Venta',rowId:r.id}));
  let html=`<div class="alert" id="ame"></div>
    <div class="grid2"><div class="field"><label>Fecha</label><input type="date" id="me-fecha" value="${first.fecha}"></div>
    <div class="field"><label>Cliente</label><select id="me-cli"><option value="">Selecciona...</option>${clientOpts(first.cliente_id)}</select></div></div>
    <div class="field"><label>Forma de pago</label><select id="me-forma"><option ${first.forma_pago==='Contado'?'selected':''}>Contado</option><option ${first.forma_pago==='Cr\u00e9dito'?'selected':''}>Cr\u00e9dito</option><option ${first.forma_pago==='Transferencia'?'selected':''}>Transferencia</option><option ${first.forma_pago==='Cheque'?'selected':''}>Cheque</option><option ${first.forma_pago==='Mixto'?'selected':''}>Mixto</option><option ${first.forma_pago==='Regal\u00edas'?'selected':''}>Regal\u00edas</option></select></div>
    <div class="sale-lines" id="me-lines"></div>
    <div class="row-actions"><button class="mini-btn" id="me-add">+ Agregar producto</button></div>
    <div style="margin-top:12px;display:flex;gap:8px"><button class="btn btn-p" id="me-save" style="flex:1">Guardar cambios</button><button class="btn btn-gray" onclick="closeModal()" style="flex:1">Cancelar</button></div>`;
  openModal('Editar venta '+ventaId,html);
  function paint(){renderSaleLines('me-lines',items,true,()=>{});}
  paint();
  g('me-add').onclick=()=>{items.push({productoId:'',qty:1,precio:0,tipo:'Venta'});paint();};
  g('me-save').onclick=async()=>{
    let btn=g('me-save');if(!lockBtn(btn))return;
    try{
      let fecha=g('me-fecha').value,cliId=g('me-cli').value,forma=g('me-forma').value;
      let cli=D.clientes.find(c=>c.id===cliId);
      if(!fecha||!cliId){showAlert('ame','Completa fecha y cliente.',false);unlockBtn(btn);return;}
      let newItems=collectLines('me-lines');
      if(!newItems.length){showAlert('ame','Agrega al menos un producto.',false);unlockBtn(btn);return;}
      // Calcular lo que ya se había pagado antes de editar (pagos iniciales + abonos posteriores)
      let totalPrev=data.reduce((s,r)=>s+parseNum(r.total),0);
      let saldoPrev=data.reduce((s,r)=>s+parseNum(r.saldo),0);
      let pagadoPrev=round2(Math.max(0,totalPrev-saldoPrev));
      // delete old rows
      await SB.from('ventas_detalle').update({eliminada:true}).eq('venta_id',ventaId);
      // insert new
      let totalSale=newItems.reduce((s,i)=>s+i.qty*i.precio,0);
      // Saldo nuevo = totalNew - pagadoPrev (respeta lo ya pagado)
      let creditoSale;
      if(forma==='Regal\u00edas'){
        creditoSale=0;
      }else{
        creditoSale=Math.max(0,round2(totalSale-pagadoPrev));
      }
      let bases=newItems.map(i=>({total:i.tipo==='Regal\u00eda'||forma==='Regal\u00edas'?0:i.qty*i.precio}));
      let saldos=distributeSaldo(bases,creditoSale);
      let rows=newItems.map((i,idx)=>({
        venta_id:ventaId,fecha,cliente_id:cliId,cliente_nombre:cli?cli.nombre:'',empleado_id:first.empleado_id,
        producto_id:i.productoId,cantidad:i.qty,precio:i.precio,total:round2(i.qty*i.precio),
        forma_pago:(i.tipo==='Regal\u00eda'||forma==='Regal\u00edas')?'Regal\u00edas':forma,
        saldo:saldos[idx],observacion:first.observacion||'',usuario:U.usuario,eliminada:false
      }));
      await SB.from('ventas_detalle').insert(rows);
      closeModal();loadVentasHist();
    }catch(ex){showAlert('ame','Error: '+ex.message,false);}
    finally{unlockBtn(btn);}
  };
}

async function deleteSale(ventaId){
  if(!confirm('\u00bfEliminar esta venta?'))return;
  await SB.from('ventas_detalle').update({eliminada:true}).eq('venta_id',ventaId);
  loadVentasHist();
}

function renderSaleLines(containerId,items,editable,onChange){
  let box=g(containerId);if(!box)return;box.innerHTML='';
  items.forEach((item,idx)=>{
    let div=document.createElement('div');div.className='sale-line';
    div.innerHTML=`<div class="sale-line-top"><span class="sale-line-title">Producto ${idx+1}</span>${editable?`<button class="mini-btn red" data-rm="${idx}">Quitar</button>`:''}</div>
      <div class="grid2"><div class="field"><label>Producto</label><select class="line-prod"><option value="">Selecciona...</option>${prodOpts(item.productoId)}</select></div>
      <div class="field"><label>Tipo</label><select class="line-type"><option ${item.tipo==='Venta'?'selected':''}>Venta</option><option ${item.tipo==='Regal\u00eda'?'selected':''}>Regal\u00eda</option></select></div></div>
      <div class="grid2"><div class="field"><label>Cantidad</label><input type="number" class="line-qty" min="0" step="1" value="${item.qty||0}"></div>
      <div class="field"><label>Precio unit.</label><input type="number" class="line-price" min="0" step="0.01" value="${item.precio||0}"></div></div>
      <div class="note">Total: <strong class="line-total">${fmt(parseNum(item.qty)*parseNum(item.precio))}</strong></div>`;
    box.appendChild(div);
  });
  if(editable){
    box.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{items.splice(parseInt(b.dataset.rm),1);if(!items.length)items.push({productoId:'',qty:1,precio:0,tipo:'Venta'});renderSaleLines(containerId,items,editable,onChange);if(onChange)onChange();});
    box.querySelectorAll('.line-prod').forEach((s,i)=>s.onchange=()=>{items[i].productoId=s.value;if(onChange)onChange();});
    box.querySelectorAll('.line-type').forEach((s,i)=>s.onchange=()=>{items[i].tipo=s.value;if(onChange)onChange();});
    box.querySelectorAll('.line-qty').forEach((inp,i)=>inp.oninput=()=>{items[i].qty=parseNum(inp.value);if(onChange)onChange();});
    box.querySelectorAll('.line-price').forEach((inp,i)=>inp.oninput=()=>{items[i].precio=parseNum(inp.value);if(onChange)onChange();});
  }
}

function collectLines(containerId){
  let box=g(containerId),items=[];if(!box)return items;
  box.querySelectorAll('.sale-line').forEach(sl=>{
    let prod=sl.querySelector('.line-prod').value;
    let tipo=sl.querySelector('.line-type').value;
    let qty=parseNum(sl.querySelector('.line-qty').value);
    let precio=parseNum(sl.querySelector('.line-price').value);
    if(prod&&qty>0)items.push({productoId:prod,qty,precio,tipo});
  });
  return items;
}

    return `<div class="litem" style="${anulado?'opacity:0.5':''}"><div class="litem-info"><h4>${r.categoria} ${anulado?'<span class=\"badge b-red\">Anulado</span>':''}</h4><p>${fmtDate(r.fecha)} \u00b7 ${r.detalle||''} ${r.proveedor_nombre?'\u00b7 '+r.proveedor_nombre:''}</p></div><div class="litem-r"><div class="amt">${fmt(r.monto)}</div><span class="badge ${r.saldo>0?'b-amber':'b-green'}">${r.condicion_pago}</span>${!anulado&&isAdmin()?`<div style="margin-top:4px"><button class="btn-sm btn-gray edit-gasto" data-id="${r.id}" style="margin-right:4px">Editar</button><button class="btn-sm btn-red del-gasto" data-id="${r.id}">Anular</button></div>`:''}</div></div>`;
  }).join('');
  el.querySelectorAll('.edit-gasto').forEach(b=>b.onclick=()=>{let eg=rows.find(r=>r.id===b.dataset.id);if(eg)editGastoModal(eg);});
  el.querySelectorAll('.del-gasto').forEach(b=>b.onclick=()=>anularGasto(b.dataset.id));
}

function editGastoModal(eg){
  let modal=g('modal-pago');
  g('mpago-body').innerHTML=`
    <h3 style="margin-bottom:14px">Editar gasto ${eg.id}</h3>
    <div class="alert" id="aeg"></div>
    <div class="grid2"><div class="field"><label>Fecha</label><input type="date" id="eg-f" value="${eg.fecha}"></div>
    <div class="field"><label>Monto</label><input type="number" id="eg-m" step="0.01" value="${parseNum(eg.monto)}"></div></div>
    <div class="field"><label>Proveedor</label><select id="eg-p"><option value="">Sin proveedor</option>${provOpts(eg.proveedor_id)}</select></div>
    <div class="field"><label>Categor\u00eda</label><select id="eg-c">${CATS.map(c=>`<option ${c===eg.categoria?'selected':''}>${c}</option>`).join('')}</select></div>
    <div class="field"><label>Condici\u00f3n de pago</label><select id="eg-cond"><option ${eg.condicion_pago==='Contado'?'selected':''}>Contado</option><option ${eg.condicion_pago==='Cr\u00e9dito'?'selected':''}>Cr\u00e9dito</option></select></div>
    <div class="field"><label>Detalle</label><input type="text" id="eg-d" value="${(eg.detalle||'').replace(/"/g,'&quot;')}"></div>
    <div class="field"><label>Observaci\u00f3n</label><input type="text" id="eg-obs" value="${(eg.observacion||'').replace(/"/g,'&quot;')}"></div>
    <button class="btn btn-p" id="btn-eg-save">Guardar cambios</button>
    <button class="btn btn-gray" id="btn-eg-cancel" style="margin-top:8px">Cancelar</button>
  `;
  modal.classList.remove('hidden');
  g('btn-eg-cancel').onclick=()=>modal.classList.add('hidden');
  g('btn-eg-save').onclick=async()=>{
    let btn=g('btn-eg-save');if(!lockBtn(btn))return;
    try{
      let f=g('eg-f').value,monto=parseNum(g('eg-m').value);
      if(!f||!monto){alert('Completa fecha y monto.');unlockBtn(btn);return;}
      let provId=g('eg-p').value;
      let prov=D.proveedores.find(p=>p.id===provId);
      let cond=g('eg-cond').value;
      let saldo=cond==='Cr\u00e9dito'?monto:0;
      let pagoInicial=cond==='Contado'?monto:0;
      // Si cambió de crédito a contado y antes tenía saldo, recalcular
      if(eg.condicion_pago==='Cr\u00e9dito'&&cond==='Contado'){
        // El saldo pendiente se elimina
        saldo=0;pagoInicial=monto;
      }else if(cond==='Cr\u00e9dito'){
        // Mantener el saldo proporcional si cambió el monto
        let pagado=round2(parseNum(eg.monto)-parseNum(eg.saldo));
        saldo=round2(Math.max(0,monto-pagado));
        pagoInicial=pagado;
      }
      await SB.from('egresos').update({
        fecha:f,monto,categoria:g('eg-c').value,detalle:g('eg-d').value.trim(),
        observacion:g('eg-obs').value.trim(),proveedor_id:provId||null,
        proveedor_nombre:prov?prov.nombre:'',condicion_pago:cond,
        pago_inicial:pagoInicial,saldo
      }).eq('id',eg.id);
      modal.classList.add('hidden');
      loadGastosList();
    }catch(ex){alert('Error: '+ex.message);}
    finally{unlockBtn(btn);}
  };
}

async function anularGasto(egresoId){
  let motivo=prompt('Motivo de anulaci\u00f3n del gasto:');
  if(!motivo)return;
  try{
    const{data:eg}=await SB.from('egresos').select('*').eq('id',egresoId).single();
    if(!eg)return;
    // Marcar el egreso como anulado
    await SB.from('egresos').update({
      monto:0,saldo:0,pago_inicial:0,
      observacion:'[ANULADO] '+(motivo)+' | Original: '+fmt(eg.monto)+' | '+(eg.observacion||'')
    }).eq('id',egresoId);
    // Anular pagos a proveedor asociados a este egreso
    const{data:pagos}=await SB.from('pagos_proveedor').select('*').eq('egreso_id',egresoId).eq('anulado',false);
    if(pagos&&pagos.length){
      for(let p of pagos){
        await SB.from('pagos_proveedor').update({anulado:true,motivo_anulacion:'Gasto anulado: '+motivo}).eq('id',p.id);
      }
    }
    alert('Gasto anulado correctamente.');
    loadGastosList();
  }catch(ex){alert('Error: '+ex.message);}
}

async function cxcResumen(){

  data.forEach(r=>{

    map[r.cliente_id].saldo+=parseNum(r.saldo);
  });
  let list=Object.values(map).filter(c=>c.saldo>0.01).sort((a,b)=>b.saldo-a.saldo);
  let totalCXC=list.reduce((s,c)=>s+c.saldo,0);
  el.innerHTML=`<div class="tbox"><span class="tbox-l">Total CXC</span><span class="tbox-v">${fmt(totalCXC)}</span></div>`+
    (list.length?list.map(c=>`<div class="litem"><div class="litem-info"><h4>${c.nombre}</h4></div><div class="litem-r"><div class="amt">${fmt(c.saldo)}</div></div></div>`).join(''):'<p style="text-align:center;color:var(--g400);padding:20px;font-size:13px">Sin saldos pendientes</p>');
}

async function cxcPorVenta(){
  let el=g('cxc-body');
  el.innerHTML=`<div class="field"><label>Cliente</label><select id="cxc-cli"><option value="">Selecciona...</option>${clientOptsDeuda()}</select></div>
    <div id="cxc-seleccion" class="hidden" style="position:sticky;top:0;background:var(--pl);border:2px solid var(--p);border-radius:10px;padding:10px 12px;margin-bottom:10px;z-index:5">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px"><div><strong id="cxc-sel-count">0</strong> venta(s) seleccionada(s) \u00b7 Total: <strong id="cxc-sel-total">$0.00</strong></div><button class="btn-sm btn-p" id="cxc-sel-pay" disabled>Abonar seleccionadas</button></div>
      <div id="cxc-sel-prods" style="font-size:12px;color:var(--pd);line-height:1.5"></div>
    </div>
    <div id="cxc-ventas"></div>`;
  g('cxc-cli').onchange=async()=>{
    let cliId=g('cxc-cli').value;
    g('cxc-seleccion').classList.add('hidden');
    if(!cliId){g('cxc-ventas').innerHTML='';return;}
    let div=g('cxc-ventas');div.innerHTML='<div class="loading"><div class="spin"></div></div>';
    const{data}=await SB.from('ventas_detalle').select('*').eq('eliminada',false).eq('cliente_id',cliId).gt('saldo',0).order('fecha');
    let rows=data||[];
    // group by venta_id
    let map={};rows.forEach(r=>{
      if(!map[r.venta_id])map[r.venta_id]={id:r.venta_id,fecha:r.fecha,total:0,saldo:0,items:[]};
      map[r.venta_id].items.push(r);map[r.venta_id].total+=parseNum(r.total);map[r.venta_id].saldo+=parseNum(r.saldo);
    });
    let groups=Object.values(map).filter(g=>g.saldo>0.01).sort((a,b)=>a.fecha.localeCompare(b.fecha));
    if(!groups.length){div.innerHTML='<p style="text-align:center;color:var(--g400);padding:20px;font-size:13px">Sin saldos pendientes</p>';return;}
    g('cxc-seleccion').classList.remove('hidden');
    div.innerHTML=groups.map(s=>`<div class="litem" style="align-items:center"><label style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer;margin:0"><input type="checkbox" class="chk-venta" data-vid="${s.id}" data-saldo="${s.saldo}" data-fecha="${s.fecha}" style="width:20px;height:20px;cursor:pointer;accent-color:var(--p)"><div class="litem-info" style="flex:1"><h4>${fmtDate(s.fecha)}</h4><p>${describeItems(s.items)} \u00b7 Total: ${fmt(s.total)}</p></div></label><div class="litem-r"><div class="amt">${fmt(s.saldo)}</div><button class="btn-sm btn-green pago-venta" data-vid="${s.id}" data-saldo="${s.saldo}" data-cli="${cliId}">Abonar sola</button></div></div>`).join('');
    div.querySelectorAll('.pago-venta').forEach(b=>b.onclick=(ev)=>{ev.stopPropagation();ev.preventDefault();pagoVentaModal(b.dataset.cli,b.dataset.vid,parseNum(b.dataset.saldo));});
    function updateSeleccion(){
      let checks=Array.from(div.querySelectorAll('.chk-venta:checked'));
      let total=checks.reduce((s,c)=>s+parseNum(c.dataset.saldo),0);
      g('cxc-sel-count').textContent=checks.length;
      g('cxc-sel-total').textContent=fmt(total);
      g('cxc-sel-pay').disabled=checks.length===0;
      // Sumar cantidades por producto en las ventas seleccionadas
      let selectedIds=new Set(checks.map(c=>c.dataset.vid));
      let porProd={};
      groups.filter(s=>selectedIds.has(s.id)).forEach(s=>{
        s.items.forEach(it=>{
          let prod=D.productos.find(p=>p.id===it.producto_id);
          let nombre=prod?prod.nombre:it.producto_id;
          porProd[nombre]=(porProd[nombre]||0)+parseNum(it.cantidad);
        });
      });
      let prodsBox=g('cxc-sel-prods');
      if(!prodsBox)return;
      if(!checks.length){prodsBox.innerHTML='';return;}
      // Ordenar: Botellones primero, despues alfabetico
      let entries=Object.entries(porProd).sort((a,b)=>{
        let aB=a[0].toLowerCase().startsWith('botell');
        let bB=b[0].toLowerCase().startsWith('botell');
        if(aB&&!bB)return -1;
        if(!aB&&bB)return 1;
        return a[0].localeCompare(b[0]);
      });
      prodsBox.innerHTML=entries.map(([nombre,qty])=>{
        let isBotellon=nombre.toLowerCase().startsWith('botell');
        let style=isBotellon?'font-weight:700;color:var(--pd);font-size:14px':'';
        return `<span style="${style}">${nombre}: ${Math.round(qty*100)/100}</span>`;
      }).join(' · ');
    }
    div.querySelectorAll('.chk-venta').forEach(c=>c.onchange=updateSeleccion);
    g('cxc-sel-pay').onclick=()=>{
      let checks=Array.from(div.querySelectorAll('.chk-venta:checked'));
      if(!checks.length)return;
      let seleccion=checks.map(c=>({ventaId:c.dataset.vid,saldo:parseNum(c.dataset.saldo),fecha:c.dataset.fecha}));
      // sort oldest first
      seleccion.sort((a,b)=>a.fecha.localeCompare(b.fecha));
      pagoMultipleModal(cliId,seleccion);
    };
  };
}

function pagoMultipleModal(cliId,seleccion){
  let cli=D.clientes.find(c=>c.id===cliId);
  let totalSel=round2(seleccion.reduce((s,v)=>s+v.saldo,0));
  let listaHtml=seleccion.map(v=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--g200)"><span>${fmtDate(v.fecha)} \u00b7 ${v.ventaId}</span><span style="font-weight:700">${fmt(v.saldo)}</span></div>`).join('');
  let html=`<div class="alert" id="ampm"></div>
    <p style="font-size:13px;margin-bottom:8px"><strong>Cliente:</strong> ${cli?cli.nombre:''}</p>
    <div class="card" style="padding:10px;margin-bottom:12px;background:var(--g50)"><div style="font-size:12px;font-weight:600;color:var(--pd);margin-bottom:6px">Ventas seleccionadas (${seleccion.length})</div>${listaHtml}<div style="display:flex;justify-content:space-between;padding-top:6px;margin-top:4px;border-top:2px solid var(--p);font-weight:700;color:var(--pd)"><span>Total seleccionado</span><span>${fmt(totalSel)}</span></div></div>

  openModal('Abono a ventas seleccionadas',html);
  function recalcPM(){
    let t=round2(parseNum(g('pm-ef').value)+parseNum(g('pm-tr').value)+parseNum(g('pm-ch').value)+parseNum(g('pm-reg').value));
    g('pm-total').textContent=fmt(t);
  }
  ['pm-ef','pm-tr','pm-ch','pm-reg'].forEach(id=>g(id).oninput=recalcPM);
  g('pm-save').onclick=async()=>{
    let ef=parseNum(g('pm-ef').value),tr=parseNum(g('pm-tr').value),ch=parseNum(g('pm-ch').value),reg=parseNum(g('pm-reg').value);
    let totalAbono=round2(ef+tr+ch+reg);
    if(totalAbono<=0){showAlert('ampm','El abono debe ser mayor a 0.',false);return;}
    if(totalAbono>totalSel+0.01){showAlert('ampm','El abono excede el total seleccionado ('+fmt(totalSel)+').',false);return;}
    let btn=g('pm-save');if(!lockBtn(btn))return;
    try{
      let pagoId=uid('P');
      let totalDinero=round2(ef+tr+ch);
      // 1. Create pago record (venta_id null porque es multi-venta)
      await SB.from('pagos').insert([{
        id:pagoId,fecha:g('pm-fecha').value,cliente_id:cliId,cliente_nombre:cli?cli.nombre:'',
        venta_id:null,efectivo:ef,transferencia:tr,cheque:ch,total_dinero:totalDinero,
        referencia:g('pm-ref').value.trim(),observacion:g('pm-obs').value.trim(),
        regalias:reg,detalle_regalia:g('pm-dreg').value.trim(),
        anulado:false,usuario:U.usuario
      }]);
      // 2. Distribute payment across selected sales (oldest first)
      let remaining=totalAbono;
      let aplicaciones=[];
      // Fetch fresh saldos for the selected ventas to avoid stale data
      let ventaIds=seleccion.map(v=>v.ventaId);
      const{data:freshRows}=await SB.from('ventas_detalle').select('*').in('venta_id',ventaIds).eq('eliminada',false).gt('saldo',0);
      // Group by venta_id
      let ventaMap=new Map();
      (freshRows||[]).forEach(r=>{
        if(!ventaMap.has(r.venta_id))ventaMap.set(r.venta_id,{id:r.venta_id,fecha:r.fecha,rows:[]});
        ventaMap.get(r.venta_id).rows.push(r);
      });
      // Process in order of the selected array (already sorted oldest first)
      for(let sel of seleccion){
        if(remaining<=0)break;
        let venta=ventaMap.get(sel.ventaId);
        if(!venta)continue;
        let ventaSaldo=round2(venta.rows.reduce((s,r)=>s+parseNum(r.saldo),0));
        if(ventaSaldo<=0)continue;
        let apply=round2(Math.min(ventaSaldo,remaining));
        if(apply<=0)continue;
        aplicaciones.push({
          id:uid('AP'),pago_id:pagoId,fecha_pago:g('pm-fecha').value,cliente_id:cliId,
          cliente_nombre:cli?cli.nombre:'',venta_id:sel.ventaId,fecha_venta:venta.fecha,
          tipo_pago:'Seleccionadas',monto:apply,detalle_regalia:g('pm-dreg').value.trim(),
          usuario:U.usuario,timestamp:new Date().toISOString()
        });
        // Reduce saldo proportionally across lines of this sale
        let left=apply;
        for(let vr of venta.rows){
          if(left<=0)break;
          let sa=parseNum(vr.saldo);
          let ap=round2(Math.min(sa,left));
          await SB.from('ventas_detalle').update({saldo:round2(sa-ap)}).eq('id',vr.id);
          left=round2(left-ap);
        }
        remaining=round2(remaining-apply);
      }
      // 3. Insert all aplicaciones
      if(aplicaciones.length)await SB.from('aplicacion_pagos').insert(aplicaciones);
      closeModal();renderCXC();
    }catch(ex){showAlert('ampm','Error: '+ex.message,false);}
    finally{unlockBtn(btn);}
  };
}

async function anularPago(pagoId,cliId){
  let motivo=prompt('Motivo de anulaci\u00f3n:');
  if(!motivo)return;
  try{
    // get the pago
    const{data:pago}=await SB.from('pagos').select('*').eq('id',pagoId).single();
    if(!pago||pago.anulado)return;
    // mark as anulado
    await SB.from('pagos').update({
      anulado:true,motivo_anulacion:motivo,
      fecha_anulacion:new Date().toISOString(),
      usuario_anulacion:U.usuario
    }).eq('id',pagoId);
    // get aplicaciones for this pago to know which sales to restore
    const{data:apps}=await SB.from('aplicacion_pagos').select('*').eq('pago_id',pagoId);
    if(apps&&apps.length){
      // restore saldo to each affected venta
      for(let ap of apps){
        if(!ap.venta_id)continue;
        const{data:vrows}=await SB.from('ventas_detalle').select('*').eq('venta_id',ap.venta_id).eq('eliminada',false);
        // distribute restored amount proportionally
        let totalVenta=(vrows||[]).reduce((s,r)=>s+parseNum(r.total),0);
        let remaining=parseNum(ap.monto);
        for(let vr of (vrows||[])){
          if(remaining<=0)break;
          let proportion=totalVenta>0?parseNum(vr.total)/totalVenta:1/(vrows.length);
          let restore=round2(Math.min(remaining,parseNum(ap.monto)*proportion));
          // ensure we don't exceed original total for this row
          let newSaldo=Math.min(parseNum(vr.total),round2(parseNum(vr.saldo)+restore));
          await SB.from('ventas_detalle').update({saldo:newSaldo}).eq('id',vr.id);
          remaining=round2(remaining-restore);
        }
      }
    } else {
      // pago was per-venta (has venta_id directly)
      if(pago.venta_id){
        let totalAbono=round2(parseNum(pago.total_dinero)+parseNum(pago.regalias));
        const{data:vrows}=await SB.from('ventas_detalle').select('*').eq('venta_id',pago.venta_id).eq('eliminada',false);
        let totalVenta=(vrows||[]).reduce((s,r)=>s+parseNum(r.total),0);
        let remaining=totalAbono;
        for(let vr of (vrows||[])){
          if(remaining<=0)break;
          let proportion=totalVenta>0?parseNum(vr.total)/totalVenta:1/(vrows.length);
          let restore=round2(Math.min(remaining,totalAbono*proportion));
          let newSaldo=Math.min(parseNum(vr.total),round2(parseNum(vr.saldo)+restore));
          await SB.from('ventas_detalle').update({saldo:newSaldo}).eq('id',vr.id);
          remaining=round2(remaining-restore);
        }
      }
    }
    renderCXC();
  }catch(ex){alert('Error anulando pago: '+ex.message);}
}

  (pSaldoData||[]).forEach(r=>{D._provSaldos[r.proveedor_id]=(D._provSaldos[r.proveedor_id]||0)+parseNum(r.saldo);});
  if(cxpView==='resumen')await cxpResumen();
  else if(cxpView==='pagar')await cxpPagar();
  else if(cxpView==='historial')await cxpHistorialView();
}

async function cxpResumen(){
  let el=g('cxp-body');
  const{data}=await SB.from('egresos').select('proveedor_id,proveedor_nombre,saldo').gt('saldo',0);
  let map={};
  (data||[]).forEach(r=>{
    let pid=r.proveedor_id||'sin';
    if(!map[pid])map[pid]={id:pid,nombre:r.proveedor_nombre||'Sin proveedor',saldo:0};
    map[pid].saldo+=parseNum(r.saldo);
  });
  let list=Object.values(map).filter(p=>p.saldo>0.01).sort((a,b)=>b.saldo-a.saldo);
  let totalCXP=list.reduce((s,p)=>s+p.saldo,0);
  el.innerHTML=`<div class="tbox"><span class="tbox-l">Total CXP</span><span class="tbox-v">${fmt(totalCXP)}</span></div>`+
    (list.length?list.map(p=>`<div class="litem"><div class="litem-info"><h4>${p.nombre}</h4></div><div class="litem-r"><div class="amt">${fmt(p.saldo)}</div></div></div>`).join(''):'<p style="text-align:center;color:var(--g400);padding:20px;font-size:13px">Sin saldos pendientes</p>');
}

function pagoProvModal(provId,egresoId,saldoPendiente){
  let prov=D.proveedores.find(p=>p.id===provId);
  let html=`<div class="alert" id="ampp"></div>
    <p style="font-size:13px;margin-bottom:12px">Egreso: <strong>${egresoId}</strong> \u00b7 Saldo: <strong>${fmt(saldoPendiente)}</strong></p>
    <div class="grid2"><div class="field"><label>Fecha</label><input type="date" id="pp-fecha" value="${hoy()}"></div>
    <div class="field"><label>Monto</label><input type="number" id="pp-monto" step="0.01" min="0" max="${saldoPendiente}" value="${saldoPendiente}"></div></div>
    <div class="field"><label>M\u00e9todo</label><select id="pp-met"><option>Efectivo</option><option>Transferencia</option><option>Cheque</option></select></div>
    <div class="field"><label>Observaci\u00f3n</label><input type="text" id="pp-obs"></div>
    <div style="display:flex;gap:8px"><button class="btn btn-p" id="pp-save" style="flex:1">Registrar pago</button><button class="btn btn-gray" onclick="closeModal()" style="flex:1">Cancelar</button></div>`;
  openModal('Pago a proveedor',html);
  g('pp-save').onclick=async()=>{
    let monto=parseNum(g('pp-monto').value);
    if(monto<=0){showAlert('ampp','El monto debe ser mayor a 0.',false);return;}
    if(monto>round2(saldoPendiente)+0.01){showAlert('ampp','El monto excede el saldo.',false);return;}
    let btn=g('pp-save');if(!lockBtn(btn))return;
    try{
      await SB.from('pagos_proveedor').insert([{
        id:uid('PP'),egreso_id:egresoId,proveedor_id:provId,proveedor_nombre:prov?prov.nombre:'',
        fecha:g('pp-fecha').value,monto,metodo:g('pp-met').value,usuario:U.usuario,
        timestamp:new Date().toISOString(),observacion:g('pp-obs').value.trim(),anulado:false
      }]);
      // reduce saldo on egreso
      const{data:eg}=await SB.from('egresos').select('saldo').eq('id',egresoId).single();
      let newSaldo=round2(parseNum(eg.saldo)-monto);
      await SB.from('egresos').update({saldo:Math.max(0,newSaldo)}).eq('id',egresoId);
      closeModal();renderCXP();
    }catch(ex){showAlert('ampp','Error: '+ex.message,false);}
    finally{unlockBtn(btn);}
  };
}

async function anularPagoProv(pagoId,egresoId,monto,provId){
  let motivo=prompt('Motivo de anulaci\u00f3n:');
  if(!motivo)return;
  try{
    const{data:pp}=await SB.from('pagos_proveedor').select('*').eq('id',pagoId).single();
    if(!pp||pp.anulado)return;
    await SB.from('pagos_proveedor').update({
      anulado:true,motivo_anulacion:motivo
    }).eq('id',pagoId);
    // restore saldo on egreso
    const{data:eg}=await SB.from('egresos').select('saldo,monto').eq('id',egresoId).single();
    if(eg){
      let newSaldo=Math.min(parseNum(eg.monto),round2(parseNum(eg.saldo)+monto));
      await SB.from('egresos').update({saldo:newSaldo}).eq('id',egresoId);
    }
    renderCXP();
  }catch(ex){alert('Error anulando pago: '+ex.message);}
}

  const c=g('content');
  c.innerHTML=`
    <div class="stitle">Corte de Caja</div>
    <div class="date-range">
      <div class="field"><label>Desde</label><input type="date" id="cj-d" value="${hoy()}"></div>
      <div class="field"><label>Hasta</label><input type="date" id="cj-h" value="${hoy()}"></div>

  `;

  loadCaja();

async function loadCaja(){
  let el=g('caja-body');if(!el)return;
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  let desde=g('cj-d').value,hasta=g('cj-h').value;

  // Load ALL historical data up to 'hasta' to compute carry-forward balances
  // NOTA: para abonosPorVenta cargamos TODOS los pagos/aplicaciones sin filtro de fecha,
  // para que el saldo inicial de una venta Mixto sea consistente sin importar qué día consultes
  // CRITICAL: Usamos fetchAll para paginar, ya que Supabase tiene limite de 1000 filas por request
  const[allVentas,allPagos,allPP,allCortes,allApp,allPagosAnyFull]=await Promise.all([
    fetchAll(SB.from('ventas_detalle').select('*').eq('eliminada',false).lte('fecha',hasta).order('fecha')),
    fetchAll(SB.from('pagos').select('*').eq('anulado',false).lte('fecha',hasta).order('fecha')),
    fetchAll(SB.from('pagos_proveedor').select('*').eq('anulado',false).lte('fecha',hasta).order('fecha')),
    fetchAll(SB.from('corte_caja').select('*').lte('fecha',hasta).order('fecha')),
    fetchAll(SB.from('aplicacion_pagos').select('pago_id,venta_id,monto')),
    fetchAll(SB.from('pagos').select('id,venta_id,total_dinero,regalias,anulado'))
  ]);
  let allPagosAny=allPagosAnyFull.filter(p=>!p.anulado);

  // Build map: total abonos aplicados a cada venta_id (para calcular saldo inicial)
  let abonosPorVenta={};
  allApp.forEach(a=>{if(a.venta_id){abonosPorVenta[a.venta_id]=(abonosPorVenta[a.venta_id]||0)+parseNum(a.monto);}});
  // Además, sumar pagos con venta_id directo que NO tengan registros en aplicacion_pagos
  allPagosAny.forEach(p=>{
    if(p.venta_id&&p.venta_id!=='ABONO_GENERAL'&&p.venta_id!==''){
      let yaEnApp=allApp.some(a=>a.pago_id===p.id);
      if(!yaEnApp){abonosPorVenta[p.venta_id]=(abonosPorVenta[p.venta_id]||0)+parseNum(p.total_dinero)+parseNum(p.regalias);}
    }
  });

  // Helper: cobrado inicial al momento de la venta (solo para Mixto)
  function cobradoInicialMixto(venta){
    // saldo_inicial = saldo_actual + abonos_aplicados_después
    let abonosAplicados=abonosPorVenta[venta.venta_id]||0;
    // OJO: abonos pueden haber sido aplicados a múltiples líneas de la misma venta
    // necesitamos distribuir proporcionalmente por línea según su total
    let totalVenta=allVentas.filter(x=>x.venta_id===venta.venta_id).reduce((s,x)=>s+parseNum(x.total),0);
    let proporcion=totalVenta>0?parseNum(venta.total)/totalVenta:0;
    let abonosLinea=abonosAplicados*proporcion;
    let saldoInicial=parseNum(venta.saldo)+abonosLinea;
    return round2(Math.max(0,parseNum(venta.total)-saldoInicial));
  }

  // Build a map of corte_caja by date
  let corteMap={};
  allCortes.forEach(c=>{corteMap[c.fecha]=c;});

  // Compute daily summaries for each date, carrying saldo forward
  function dailyMoves(fecha){
    let e_ef=0,e_tr=0,e_ch=0,s_ef=0,s_tr=0,s_ch=0;
    allVentas.filter(v=>v.fecha===fecha).forEach(v=>{
      let fp=v.forma_pago;
      if(fp==='Contado')e_ef+=parseNum(v.total);
      else if(fp==='Transferencia')e_tr+=parseNum(v.total);
      else if(fp==='Cheque')e_ch+=parseNum(v.total);
      else if(fp==='Mixto'){
        // En mixto, lo cobrado AL MOMENTO DE LA VENTA (antes de abonos posteriores)
        e_ef+=cobradoInicialMixto(v);
      }
      // Crédito y Regalías NO entran a caja
    });
    allPagos.filter(p=>p.fecha===fecha).forEach(p=>{
      e_ef+=parseNum(p.efectivo);e_tr+=parseNum(p.transferencia);e_ch+=parseNum(p.cheque);
      // Regalías NO entran a caja
    });
    allPP.filter(p=>p.fecha===fecha).forEach(p=>{
      if(p.metodo==='Efectivo')s_ef+=parseNum(p.monto);
      else if(p.metodo==='Transferencia')s_tr+=parseNum(p.monto);
      else if(p.metodo==='Cheque')s_ch+=parseNum(p.monto);
    });
    return {e_ef,e_tr,e_ch,s_ef,s_tr,s_ch,
      totalEnt:round2(e_ef+e_tr+e_ch),totalSal:round2(s_ef+s_tr+s_ch)};
  }

  // Collect all unique dates up to 'hasta', sorted
  let allDates=new Set();
  allVentas.forEach(v=>allDates.add(v.fecha));
  allPagos.forEach(p=>allDates.add(p.fecha));
  allPP.forEach(p=>allDates.add(p.fecha));
  allCortes.forEach(c=>allDates.add(c.fecha));
  allDates.add(desde);
  let sortedDates=[...allDates].filter(d=>d&&d<=hasta).sort();

  // Walk through all dates to compute carry-forward saldo
  let carry=0;
  let dailyData={};
  sortedDates.forEach(fecha=>{
    let corte=corteMap[fecha]||null;
    let opening=corte?parseNum(corte.saldo_inicial):carry;
    let ajuste=corte?parseNum(corte.ajuste):0;
    let moves=dailyMoves(fecha);
    let closing=round2(opening+ajuste+moves.totalEnt-moves.totalSal);
    dailyData[fecha]={opening,ajuste,moves,closing,corte};
    carry=closing;
  });

  // Now get the data for the selected range
  let rangeVentas=allVentas.filter(v=>v.fecha>=desde&&v.fecha<=hasta);
  let rangePagos=allPagos.filter(p=>p.fecha>=desde&&p.fecha<=hasta);
  let rangePP=allPP.filter(p=>p.fecha>=desde&&p.fecha<=hasta);

  // Entradas del rango
  let ent_ef=0,ent_tr=0,ent_ch=0;
  rangeVentas.forEach(v=>{
    let fp=v.forma_pago;
    if(fp==='Contado')ent_ef+=parseNum(v.total);
    else if(fp==='Transferencia')ent_tr+=parseNum(v.total);
    else if(fp==='Cheque')ent_ch+=parseNum(v.total);
    else if(fp==='Mixto'){
      ent_ef+=cobradoInicialMixto(v);
    }
    // Crédito y Regalías NO entran a caja
  });
  rangePagos.forEach(p=>{
    ent_ef+=parseNum(p.efectivo);ent_tr+=parseNum(p.transferencia);ent_ch+=parseNum(p.cheque);
  });

  // Salidas del rango
  let sal_ef=0,sal_tr=0,sal_ch=0;
  rangePP.forEach(p=>{
    if(p.metodo==='Efectivo')sal_ef+=parseNum(p.monto);
    else if(p.metodo==='Transferencia')sal_tr+=parseNum(p.monto);
    else if(p.metodo==='Cheque')sal_ch+=parseNum(p.monto);
  });

  let totalEnt=round2(ent_ef+ent_tr+ent_ch);
  let totalSal=round2(sal_ef+sal_tr+sal_ch);

  // Saldo inicial = opening del primer dia del rango (arrastrado)
  let dayData=dailyData[desde];
  let saldoInicial=dayData?dayData.opening:carry;
  let ajuste=dayData?dayData.ajuste:0;
  let corte=dayData?dayData.corte:null;
  let saldoFinal=round2(saldoInicial+ajuste+totalEnt-totalSal);

  let ventas=rangeVentas;
  let pagos=rangePagos;
  let ppagos=rangePP;

  el.innerHTML=`
    ${U.rol==='admin'?`<div class="card"><div class="grid2">
      <div class="field"><label>Saldo inicial</label><input type="number" id="cj-si" step="0.01" value="${saldoInicial}"></div>
      <div class="field"><label>Ajuste admin</label><input type="number" id="cj-aj" step="0.01" value="${ajuste}"></div>
    </div><div class="field"><label>Observaci\u00f3n</label><input type="text" id="cj-obs" value="${corte?corte.observacion||'':''}"></div>
    <button class="btn-sm btn-p" id="btn-cj-save">Guardar corte</button></div>`:''}
    <div class="mgrid">
      <div class="mcard"><div class="mcard-l">Saldo inicial</div><div class="mcard-v">${fmt(saldoInicial)}</div></div>
      <div class="mcard"><div class="mcard-l">Ajuste</div><div class="mcard-v">${fmt(ajuste)}</div></div>
    </div>
    <div class="card"><h4 style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:8px">Entradas</h4>
      <table class="dtable"><tr><th>Tipo</th><th>Efectivo</th><th>Transf.</th><th>Cheque</th></tr>
      <tr><td>Total</td><td>${fmt(ent_ef)}</td><td>${fmt(ent_tr)}</td><td>${fmt(ent_ch)}</td></tr>
      <tr style="font-weight:700"><td>TOTAL</td><td colspan="3" style="text-align:right">${fmt(totalEnt)}</td></tr></table>
    </div>
    <div class="card"><h4 style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:8px">Salidas</h4>
      <table class="dtable"><tr><th>Tipo</th><th>Efectivo</th><th>Transf.</th><th>Cheque</th></tr>
      <tr><td>Total</td><td>${fmt(sal_ef)}</td><td>${fmt(sal_tr)}</td><td>${fmt(sal_ch)}</td></tr>
      <tr style="font-weight:700"><td>TOTAL</td><td colspan="3" style="text-align:right">${fmt(totalSal)}</td></tr></table>
    </div>
    <div class="tbox" style="background:#D1FAE5"><span class="tbox-l" style="color:#065F46">Saldo final</span><span class="tbox-v" style="color:#065F46">${fmt(saldoFinal)}</span></div>
    <div class="card"><h4 style="font-size:13px;font-weight:700;margin-bottom:8px">Detalle entradas</h4>
      <table class="dtable"><tr><th>Tipo</th><th>Cliente/Ref</th><th>Monto</th></tr>
      ${ventas.filter(v=>['Contado','Transferencia','Cheque'].includes(v.forma_pago)).map(v=>`<tr><td>Venta ${v.forma_pago}</td><td>${v.cliente_nombre}</td><td>${fmt(v.total)}</td></tr>`).join('')}
      ${ventas.filter(v=>v.forma_pago==='Mixto').map(v=>{let c=cobradoInicialMixto(v);return c>0?`<tr><td>Venta Mixto</td><td>${v.cliente_nombre}</td><td>${fmt(c)}</td></tr>`:''}).join('')}
      ${pagos.map(p=>`<tr><td>Abono</td><td>${p.cliente_nombre} ${p.referencia?'('+p.referencia+')':''}</td><td>${fmt(parseNum(p.total_dinero))}</td></tr>`).join('')}
      ${!ventas.filter(v=>['Contado','Transferencia','Cheque','Mixto'].includes(v.forma_pago)).length&&!pagos.length?'<tr><td colspan="3" style="text-align:center;color:var(--g400)">Sin entradas</td></tr>':''}
      </table>
    </div>
    <div class="card"><h4 style="font-size:13px;font-weight:700;margin-bottom:8px">Detalle salidas</h4>
      <table class="dtable"><tr><th>M\u00e9todo</th><th>Proveedor</th><th>Monto</th></tr>
      ${ppagos.map(p=>`<tr><td>${p.metodo}</td><td>${p.proveedor_nombre||''}</td><td>${fmt(p.monto)}</td></tr>`).join('')}
      ${!ppagos.length?'<tr><td colspan="3" style="text-align:center;color:var(--g400)">Sin salidas</td></tr>':''}
      </table>
    </div>
  `;

  if(U.rol==='admin'&&g('btn-cj-save')){
    g('btn-cj-save').onclick=async()=>{
      let btn=g('btn-cj-save');if(!lockBtn(btn))return;
      try{
        await SB.from('corte_caja').upsert({
          fecha:desde,saldo_inicial:parseNum(g('cj-si').value),
          entradas_ef:ent_ef,entradas_tr:ent_tr,entradas_ch:ent_ch,total_entradas:totalEnt,
          salidas_ef:sal_ef,salidas_tr:sal_tr,salidas_ch:sal_ch,total_salidas:totalSal,
          saldo_final:round2(parseNum(g('cj-si').value)+parseNum(g('cj-aj').value)+totalEnt-totalSal),
          observacion:g('cj-obs').value.trim(),ajuste:parseNum(g('cj-aj').value),
          usuario:U.usuario,timestamp:new Date().toISOString()
        });
        alert('Corte guardado.');loadCaja();
      }catch(ex){alert('Error: '+ex.message);}
      finally{unlockBtn(btn);}
    };
  }
}

async function loadDash(){
  let el=g('dash-body');if(!el)return;
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  let desde=g('dd').value,hasta=g('dh').value;

  const[ventasArr,pagosArr,egresosArr,ppArr,cxcArr,cxpArr]=await Promise.all([
    fetchAll(SB.from('ventas_detalle').select('*').eq('eliminada',false).gte('fecha',desde).lte('fecha',hasta)),
    fetchAll(SB.from('pagos').select('*').eq('anulado',false).gte('fecha',desde).lte('fecha',hasta)),
    fetchAll(SB.from('egresos').select('*').gte('fecha',desde).lte('fecha',hasta)),
    fetchAll(SB.from('pagos_proveedor').select('*').eq('anulado',false).gte('fecha',desde).lte('fecha',hasta)),
    fetchAll(SB.from('ventas_detalle').select('cliente_id,cliente_nombre,saldo').eq('eliminada',false).gt('saldo',0)),
    fetchAll(SB.from('egresos').select('proveedor_id,proveedor_nombre,saldo').gt('saldo',0))
  ]);
  // wrap in {data:...} para compat con codigo existente
  const ventasRes={data:ventasArr},pagosRes={data:pagosArr},egresosRes={data:egresosArr},ppRes={data:ppArr},cxcRes={data:cxcArr},cxpRes={data:cxpArr};

  let ventas=ventasRes.data||[];
  let pagos=pagosRes.data||[];
  let egresos=egresosRes.data||[];
  let ppagos=ppRes.data||[];

  let ventasNetas=ventas.filter(v=>v.forma_pago!=='Regal\u00edas').reduce((s,v)=>s+parseNum(v.total),0);
  let unidades=ventas.reduce((s,v)=>s+parseNum(v.cantidad),0);
  let cobrado=pagos.reduce((s,p)=>s+parseNum(p.total_dinero),0);
  // add contado/transfer/cheque ventas as cobrado
  ventas.filter(v=>['Contado','Transferencia','Cheque'].includes(v.forma_pago)).forEach(v=>{cobrado+=parseNum(v.total);});
  let regalias=ventas.filter(v=>v.forma_pago==='Regal\u00edas').reduce((s,v)=>s+parseNum(v.total),0);
  regalias+=pagos.reduce((s,p)=>s+parseNum(p.regalias),0);

  let totalGastos=egresos.reduce((s,e)=>s+parseNum(e.monto),0);
  let totalCXC=(cxcRes.data||[]).reduce((s,r)=>s+parseNum(r.saldo),0);
  let totalCXP=(cxpRes.data||[]).reduce((s,r)=>s+parseNum(r.saldo),0);
  let abonosProv=ppagos.reduce((s,p)=>s+parseNum(p.monto),0);
  let utilidad=round2(ventasNetas-totalGastos);

  el.innerHTML=`
    <div class="mgrid">
      <div class="mcard"><div class="mcard-l">Ventas netas</div><div class="mcard-v">${fmt(ventasNetas)}</div></div>
      <div class="mcard"><div class="mcard-l">Unidades</div><div class="mcard-v">${unidades}</div></div>
      <div class="mcard"><div class="mcard-l">Cobrado</div><div class="mcard-v" style="color:var(--green)">${fmt(cobrado)}</div></div>
      <div class="mcard"><div class="mcard-l">Regal\u00edas</div><div class="mcard-v" style="color:var(--amber)">${fmt(regalias)}</div></div>
    </div>
    ${U.rol==='admin'?`<div class="mgrid">
      <div class="mcard"><div class="mcard-l">Gastos</div><div class="mcard-v" style="color:var(--red)">${fmt(totalGastos)}</div></div>
      <div class="mcard"><div class="mcard-l">CXC total</div><div class="mcard-v">${fmt(totalCXC)}</div></div>
      <div class="mcard"><div class="mcard-l">CXP total</div><div class="mcard-v">${fmt(totalCXP)}</div></div>
      <div class="mcard"><div class="mcard-l">Abonos prov.</div><div class="mcard-v">${fmt(abonosProv)}</div></div>
      <div class="mcard"><div class="mcard-l">Utilidad est.</div><div class="mcard-v" style="color:${utilidad>=0?'var(--green)':'var(--red)'}">${fmt(utilidad)}</div></div>
    </div>`:''}`+buildTopClients(ventas)+buildTopProducts(ventas)+buildDailyDetail(ventas);
}

function buildTopClients(ventas){
  let map={};
  ventas.forEach(v=>{
    if(!map[v.cliente_id])map[v.cliente_id]={nombre:v.cliente_nombre,total:0};
    map[v.cliente_id].total+=parseNum(v.total);
  });
  let list=Object.values(map).sort((a,b)=>b.total-a.total).slice(0,5);
  if(!list.length)return'';
  let max=list[0].total;
  return `<div class="card"><h4 style="font-size:13px;font-weight:700;margin-bottom:8px">Top 5 clientes</h4>`+
    list.map(c=>`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12px"><span>${c.nombre}</span><span style="font-weight:700">${fmt(c.total)}</span></div><div class="bar"><span style="width:${max?Math.round(c.total/max*100):0}%"></span></div></div>`).join('')+'</div>';
}

function buildTopProducts(ventas){
  let map={};
  ventas.forEach(v=>{
    let p=D.productos.find(x=>x.id===v.producto_id);
    let nm=p?p.nombre:v.producto_id;
    if(!map[v.producto_id])map[v.producto_id]={nombre:nm,qty:0};
    map[v.producto_id].qty+=parseNum(v.cantidad);
  });
  let list=Object.values(map).sort((a,b)=>b.qty-a.qty).slice(0,5);
  if(!list.length)return'';
  let max=list[0].qty;
  return `<div class="card"><h4 style="font-size:13px;font-weight:700;margin-bottom:8px">Top 5 productos</h4>`+
    list.map(p=>`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12px"><span>${p.nombre}</span><span style="font-weight:700">${p.qty} und.</span></div><div class="bar"><span style="width:${max?Math.round(p.qty/max*100):0}%"></span></div></div>`).join('')+'</div>';
}

function buildDailyDetail(ventas){
  // Resumen por cliente en el rango: total dinero + cantidades agrupadas por producto
  let map={};
  ventas.forEach(v=>{
    if(!map[v.cliente_id])map[v.cliente_id]={nombre:v.cliente_nombre,total:0,productos:{}};
    map[v.cliente_id].total+=parseNum(v.total);
    let p=D.productos.find(x=>x.id===v.producto_id);
    let nm=p?p.nombre:v.producto_id;
    map[v.cliente_id].productos[nm]=(map[v.cliente_id].productos[nm]||0)+parseNum(v.cantidad);
  });
  let list=Object.values(map).sort((a,b)=>b.total-a.total);
  if(!list.length)return'';
  let totalGral=list.reduce((s,c)=>s+c.total,0);
  return `<div class="card"><h4 style="font-size:13px;font-weight:700;margin-bottom:8px">Resumen por cliente <span style="color:var(--g400);font-weight:500">\u00b7 ${list.length} clientes \u00b7 ${fmt(totalGral)}</span></h4>`+
    list.map(c=>{
      // Ordenar productos: Botellones primero, luego alfabetico
      let entries=Object.entries(c.productos).sort((a,b)=>{
        let aB=a[0].toLowerCase().startsWith('botell');
        let bB=b[0].toLowerCase().startsWith('botell');
        if(aB&&!bB)return -1;
        if(!aB&&bB)return 1;
        return a[0].localeCompare(b[0]);
      });
      let prodsHtml=entries.map(([n,q])=>{
        let isB=n.toLowerCase().startsWith('botell');
        return `<span style="${isB?'font-weight:700;color:var(--pd)':'color:var(--g600)'}">${n}: ${Math.round(q*100)/100}</span>`;
      }).join(' \u00b7 ');
      return `<div style="padding:8px 0;border-bottom:1px solid var(--g200)"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span style="font-weight:600">${c.nombre}</span><span style="font-weight:700;color:var(--pd)">${fmt(c.total)}</span></div><div style="font-size:11px;line-height:1.5">${prodsHtml}</div></div>`;
    }).join('')+'</div>';
}

async function renderUsuarios(){
  if(U.rol!=='admin'){g('content').innerHTML='<div class="loading">Sin acceso</div>';return;}
  const c=g('content');
  c.innerHTML='<div class="loading"><div class="spin"></div></div>';
  const{data}=await SB.from('empleados').select('*').order('nombre');
  let users=(data||[]).filter(u=>u.usuario&&u.usuario.trim());
  c.innerHTML=`
    <div class="stitle">Gesti\u00f3n de usuarios</div>
    <div class="subtle">Solo el administrador puede agregar, editar claves y desactivar usuarios.</div>
    <div class="alert" id="au"></div>
    <button class="btn-sm btn-p" id="btn-new-user" style="margin-bottom:14px">+ Nuevo usuario</button>
    <div id="users-list">${users.map(u=>`
      <div class="litem">
        <div class="litem-info">
          <h4>${u.nombre} ${u.activo===false?'<span class="badge b-gray">Inactivo</span>':''}</h4>
          <p>Usuario: <strong>${u.usuario}</strong> \u00b7 Rol: <strong>${u.rol}</strong> \u00b7 Clave: <strong>${u.clave}</strong></p>
        </div>
        <div class="litem-r">
          <button class="btn-sm btn-gray edit-user" data-id="${u.id}" style="margin:2px">Editar</button>
        </div>
      </div>`).join('')}
      ${!users.length?'<div class="loading">No hay usuarios registrados</div>':''}
    </div>
  `;
  g('btn-new-user').onclick=()=>openUserModal(null);
  document.querySelectorAll('.edit-user').forEach(btn=>{
    btn.onclick=()=>{let u=users.find(x=>x.id===btn.dataset.id);if(u)openUserModal(u);};
  });
}

function openUserModal(user){
  let isNew=!user;
  let modal=g('modal-pago');
  g('mpago-body').innerHTML=`
    <h3 style="margin-bottom:14px">${isNew?'Nuevo usuario':'Editar usuario'}</h3>
    <div class="field"><label>Nombre</label><input type="text" id="mu-nom" value="${user?user.nombre:''}"></div>
    <div class="grid2">
      <div class="field"><label>Usuario (login)</label><input type="text" id="mu-user" value="${user?user.usuario:''}" ${isNew?'':'readonly style="background:var(--g50)"'}></div>
      <div class="field"><label>Clave (PIN)</label><input type="text" id="mu-pass" value="${user?user.clave:''}" maxlength="6"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Rol</label><select id="mu-rol">
        <option value="admin" ${user&&user.rol==='admin'?'selected':''}>Admin</option>
        <option value="super" ${user&&user.rol==='super'?'selected':''}>Supervisor</option>
        <option value="vendedor" ${(!user||user.rol==='vendedor')?'selected':''}>Vendedor</option>
      </select></div>
      <div class="field"><label>Estado</label><select id="mu-act">
        <option value="true" ${!user||user.activo!==false?'selected':''}>Activo</option>
        <option value="false" ${user&&user.activo===false?'selected':''}>Inactivo</option>
      </select></div>
    </div>
    <button class="btn btn-p" id="btn-save-user">Guardar</button>
    <button class="btn btn-gray" id="btn-cancel-user" style="margin-top:8px">Cancelar</button>
  `;
  modal.classList.remove('hidden');
  g('btn-cancel-user').onclick=()=>modal.classList.add('hidden');
  g('btn-save-user').onclick=async()=>{
    let btn=g('btn-save-user');if(!lockBtn(btn))return;
    let nombre=g('mu-nom').value.trim();
    let usuario=g('mu-user').value.trim();
    let clave=g('mu-pass').value.trim();
    let rol=g('mu-rol').value;
    let activo=g('mu-act').value==='true';
    if(!nombre||!usuario||!clave){unlockBtn(btn);alert('Completa nombre, usuario y clave.');return;}
    try{
      if(isNew){
        let id=uid('USR');
        const{error}=await SB.from('empleados').insert({id,nombre,usuario,clave,rol,activo});
        if(error)throw error;
      }else{
        const{error}=await SB.from('empleados').update({nombre,clave,rol,activo}).eq('id',user.id);
        if(error)throw error;
      }
      modal.classList.add('hidden');
      renderUsuarios();
    }catch(ex){
      alert('Error: '+(ex.message||ex.details||'No se pudo guardar'));
    }finally{unlockBtn(btn);}
  };
}
