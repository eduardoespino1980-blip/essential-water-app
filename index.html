<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essential Water</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--p:#7C3AED;--pd:#5B21B6;--pl:#EDE9FE;--g50:#F9FAFB;--g200:#E5E7EB;--g400:#9CA3AF;--g600:#4B5563;--g800:#1F2937;--green:#10B981;--red:#EF4444;--amber:#F59E0B}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--g50);color:var(--g800);min-height:100vh}
.hidden{display:none!important}
#login-screen{min-height:100vh;background:linear-gradient(135deg,var(--pd),var(--p));display:flex;align-items:center;justify-content:center;padding:20px}
.lcard{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:360px;box-shadow:0 20px 40px rgba(0,0,0,.2)}
.logo{text-align:center;margin-bottom:28px}
.logo-circle{width:60px;height:60px;background:var(--p);border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center}
.logo-circle svg{width:28px;height:28px;fill:#fff}
.logo h1{font-size:20px;font-weight:700}
.logo p{font-size:12px;color:var(--g400);margin-top:3px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--g600);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border:1.5px solid var(--g200);border-radius:10px;font-size:15px;font-family:'Inter',sans-serif;background:#fff;color:var(--g800)}
.field input:focus,.field select:focus{outline:none;border-color:var(--p)}
.lerr{background:#FEE2E2;color:#991B1B;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;display:none}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-p{background:var(--p);color:#fff}
.btn-p:hover{background:var(--pd)}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.topbar{background:var(--p);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tb-left{display:flex;align-items:center;gap:8px}
.tb-logo{width:30px;height:30px;background:rgba(255,255,255,.2);border-radius:7px;display:flex;align-items:center;justify-content:center}
.tb-logo svg{width:16px;height:16px;fill:#fff}
.tb-title{font-size:14px;font-weight:700}
.tb-right{display:flex;align-items:center;gap:8px}
.ubadge{background:rgba(255,255,255,.2);border-radius:16px;padding:4px 10px;font-size:11px}
.btn-out{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:7px;padding:6px 10px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif}
.content{padding:16px;max-width:580px;margin:0 auto}
.stitle{font-size:17px;font-weight:700;margin-bottom:14px}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.tbox{background:var(--pl);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.tbox-l{font-size:12px;font-weight:600;color:var(--pd)}
.tbox-v{font-size:20px;font-weight:700;color:var(--pd)}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500;margin-bottom:12px;display:none}
.alert-ok{background:#D1FAE5;color:#065F46}
.alert-err{background:#FEE2E2;color:#991B1B}
.litem{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.05);display:flex;justify-content:space-between;align-items:center}
.litem-info h4{font-size:13px;font-weight:600}
.litem-info p{font-size:11px;color:var(--g400);margin-top:2px}
.litem-r{text-align:right}
.litem-r .amt{font-size:14px;font-weight:700;color:var(--pd)}
.badge{display:inline-block;padding:3px 9px;border-radius:16px;font-size:10px;font-weight:700}
.b-green{background:#D1FAE5;color:#065F46}.b-red{background:#FEE2E2;color:#991B1B}
.b-amber{background:#FEF3C7;color:#92400E}.b-purple{background:var(--pl);color:var(--pd)}
.b-gray{background:var(--g200);color:var(--g600)}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mcard{background:#fff;border-radius:12px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);border-left:3px solid var(--p)}
.mcard-l{font-size:10px;color:var(--g400);font-weight:500;text-transform:uppercase;margin-bottom:3px}
.mcard-v{font-size:19px;font-weight:700}
.mixto-box{background:var(--g50);border:1.5px dashed var(--p);border-radius:10px;padding:12px;margin-bottom:12px;display:none}
.mlabel{font-size:11px;font-weight:700;color:var(--pd);margin-bottom:8px;text-transform:uppercase}
.bnav{background:#fff;border-top:1px solid var(--g200);display:flex;position:sticky;bottom:0;z-index:100}
.nitem{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 4px;cursor:pointer;color:var(--g400);border:none;background:none;font-family:'Inter',sans-serif}
.nitem.active{color:var(--p)}
.nitem svg{width:20px;height:20px;margin-bottom:2px}
.nitem span{font-size:10px;font-weight:500}
.loading{text-align:center;padding:32px;color:var(--g400);font-size:13px}
.spin{width:28px;height:28px;border:3px solid var(--g200);border-top-color:var(--p);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:7px;width:auto;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600}
.btn-green{background:var(--green);color:#fff}
.btn-gray{background:var(--g200);color:var(--g800)}
@media(min-width:600px){.content{padding:20px}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="lcard">
    <div class="logo">
      <div class="logo-circle"><svg viewBox="0 0 24 24"><path d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2C20 10.48 17.33 6.55 12 2z"/></svg></div>
      <h1>Essential Water</h1>
      <p>Sistema de control de ventas</p>
    </div>
    <div class="lerr" id="lerr"></div>
    <div class="field"><label>Usuario</label><input type="text" id="inp-user" placeholder="Tu usuario" autocomplete="username"></div>
    <div class="field"><label>Clave</label><input type="password" id="inp-pass" placeholder="6 dígitos" maxlength="6" autocomplete="current-password"></div>
    <button class="btn btn-p" id="btn-login">Ingresar</button>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-logo"><svg viewBox="0 0 24 24"><path d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2C20 10.48 17.33 6.55 12 2z"/></svg></div>
      <span class="tb-title">Essential Water</span>
    </div>
    <div class="tb-right">
      <span class="ubadge" id="ubadge">—</span>
      <button class="btn-out" id="btn-logout">Salir</button>
    </div>
  </div>
  <div class="content" id="content"><div class="loading"><div class="spin"></div>Cargando...</div></div>
  <nav class="bnav" id="bnav"></nav>
</div>

<div class="modal-ov hidden" id="modal-pago">
  <div class="modal"><h3>Registrar pago</h3><div id="mpago-body"></div></div>
</div>
<div class="modal-ov hidden" id="modal-cliente">
  <div class="modal"><h3 id="mcli-title">Nuevo cliente</h3><div id="mcli-body"></div></div>
</div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbwxyEIMLibvoUxwEiOP1VFpFwEpi0Jx2hD1hcZMlK6g0bZTixtefDJGB1SJderdfOcPJQ/exec';
var U = null;
var D = {ventas:[],clientes:[],deudas:[],gastos:[],empleados:[]};

function g(id){return document.getElementById(id);}
function fmt(n){return '$'+parseFloat(n||0).toFixed(2);}
function hoy(){return new Date().toISOString().split('T')[0];}
function ts(){return new Date().toLocaleString('es');}
function uid(p){return p+'-'+Date.now().toString(36).toUpperCase();}
function api(params){return fetch(API+'?'+new URLSearchParams(params)).then(function(r){return r.json();});}
function showErr(id,msg){var e=g(id);if(!e)return;e.textContent=msg;e.className='alert alert-err';e.style.display='block';setTimeout(function(){e.style.display='none';},4000);}
function showOk(id,msg){var e=g(id);if(!e)return;e.textContent=msg;e.className='alert alert-ok';e.style.display='block';setTimeout(function(){e.style.display='none';},4000);}

// LOGIN
g('btn-login').onclick = function(){
  var user=g('inp-user').value.trim(), pass=g('inp-pass').value.trim();
  var err=g('lerr');
  if(!user||!pass){err.textContent='Ingresa usuario y clave';err.style.display='block';return;}
  err.style.display='none';
  var btn=g('btn-login'); btn.disabled=true; btn.textContent='Verificando...';
  api({action:'login',usuario:user,clave:pass})
    .then(function(r){
      if(r.status==='ok'){
        U=r.user;
        g('login-screen').classList.add('hidden');
        g('app').classList.remove('hidden');
        g('ubadge').textContent=U.nombre;
        loadAll().then(function(){buildNav();showTab('ventas');});
      } else {
        err.textContent=r.message||'Usuario o clave incorrectos';
        err.style.display='block';
      }
    })
    .catch(function(){err.textContent='Error de conexión';err.style.display='block';})
    .finally(function(){btn.disabled=false;btn.textContent='Ingresar';});
};
g('inp-pass').onkeypress=function(e){if(e.key==='Enter')g('btn-login').click();};
g('inp-user').onkeypress=function(e){if(e.key==='Enter')g('inp-pass').focus();};
g('btn-logout').onclick=function(){U=null;g('app').classList.add('hidden');g('login-screen').classList.remove('hidden');g('inp-user').value='';g('inp-pass').value='';};

// LOAD DATA
function loadAll(){
  var sheets=['Ventas','Clientes','Deudas','Gastos','Empleados'];
  return Promise.all(sheets.map(function(s){
    return api({action:'getSheet',sheet:s}).then(function(r){
      if(r.status==='ok') D[s.toLowerCase()]=r.data.slice(1).filter(function(row){return row[0];});
    });
  }));
}

// NAV
function buildNav(){
  var tabs=[{id:'ventas',label:'Ventas',svg:'<path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-8.9-5h9.45c.75 0 1.41-.41 1.75-1.03l3.24-5.88A1 1 0 0020.66 5H5.21L4.27 3H1v2h2l3.6 7.59L5.25 15c-.22.38-.25.83-.25 1 0 1.1.9 2 2 2h12v-2H7.42c-.13 0-.25-.11-.25-.25l.03-.12.9-1.63z"/>'}];
  if(U.rol!=='vendedor') tabs.push({id:'gastos',label:'Gastos',svg:'<path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>'});
  tabs.push({id:'clientes',label:'Clientes',svg:'<path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>'});
  tabs.push({id:'deudas',label:'Deudas',svg:'<path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/>'});
  if(U.rol==='admin') tabs.push({id:'dashboard',label:'Dashboard',svg:'<path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>'});
  var nav=g('bnav'); nav.innerHTML='';
  tabs.forEach(function(t){
    var b=document.createElement('button');
    b.className='nitem'; b.id='nav-'+t.id;
    b.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor">'+t.svg+'</svg><span>'+t.label+'</span>';
    b.onclick=function(){showTab(t.id);};
    nav.appendChild(b);
  });
}

function showTab(id){
  document.querySelectorAll('.nitem').forEach(function(b){b.classList.remove('active');});
  var nb=g('nav-'+id); if(nb) nb.classList.add('active');
  g('content').innerHTML='<div class="loading"><div class="spin"></div>Cargando...</div>';
  setTimeout(function(){
    if(id==='ventas') renderVentas();
    else if(id==='gastos') renderGastos();
    else if(id==='clientes') renderClientes();
    else if(id==='deudas') renderDeudas();
    else if(id==='dashboard') renderDashboard();
  },80);
}

// VENTAS
function renderVentas(){
  var lista=D.ventas.length?D.ventas.slice(-10).reverse().map(function(v){
    var c={'Contado':'b-green','Crédito':'b-red','Transferencia':'b-purple','Cheque':'b-amber','Mixto':'b-amber'};
    return '<div class="litem"><div class="litem-info"><h4>'+v[3]+'</h4><p>'+v[1]+' · '+v[4]+'</p></div><div class="litem-r"><div class="amt">'+fmt(v[7])+'</div><span class="badge '+(c[v[8]]||'b-gray')+'">'+v[8]+'</span></div></div>';
  }).join(''):'<p style="color:var(--g400);text-align:center;padding:20px;font-size:13px">Sin ventas aún</p>';
  g('content').innerHTML='<div class="stitle">Registrar venta</div>'+
  '<div class="alert" id="av"></div>'+
  '<div class="card">'+
  '<div class="grid2"><div class="field"><label>Fecha</label><input type="date" id="vf" value="'+hoy()+'"></div>'+
  '<div class="field"><label>Empleado</label><select id="ve"><option value="">Selecciona...</option>'+
  D.empleados.map(function(e){return '<option value="'+e[0]+'">'+e[1]+'</option>';}).join('')+
  '</select></div></div>'+
  '<div class="field"><label>Cliente</label><select id="vc"><option value="">Selecciona...</option>'+
  D.clientes.map(function(cl){return '<option value="'+cl[0]+'">'+cl[1]+'</option>';}).join('')+
  '</select></div>'+
  '<div class="grid2"><div class="field"><label>Producto</label><select id="vp"><option value="">Selecciona...</option>'+
  [['Galón agua',0.63],['Paca agua',3.50],['Paca FISA',5.30],['Botellón $4',4.00],['Botellón $6',6.00],['Paca 1Lt',1.80]].map(function(p){
    return '<option value="'+p[0]+'" data-precio="'+p[1]+'">'+p[0]+' ('+fmt(p[1])+')</option>';
  }).join('')+'</select></div>'+
  '<div class="field"><label>Cantidad</label><input type="number" id="vq" min="1" placeholder="0"></div></div>'+
  '<div class="tbox"><span class="tbox-l">Total</span><span class="tbox-v" id="vtotal">$0.00</span></div>'+
  '<div class="field"><label>Condición de pago</label>'+
  '<select id="vcond"><option value="Contado">Contado</option><option value="Crédito">Crédito</option><option value="Transferencia">Transferencia</option><option value="Cheque">Cheque</option><option value="Mixto">Mixto</option></select></div>'+
  '<div class="mixto-box" id="vmixto">'+
  '<div class="mlabel">Desglose mixto</div>'+
  '<div class="grid3"><div class="field"><label>Efectivo</label><input type="number" id="vef" placeholder="0.00" step="0.01"></div>'+
  '<div class="field"><label>Transf.</label><input type="number" id="vtr" placeholder="0.00" step="0.01"></div>'+
  '<div class="field"><label>Crédito</label><input type="number" id="vcr" readonly style="background:var(--g50)"></div></div></div>'+
  '<div class="field"><label>Observación</label><input type="text" id="vobs" placeholder="Opcional..."></div>'+
  '<button class="btn btn-p" id="btn-venta">Guardar venta</button></div>'+
  '<div class="card"><div class="stitle" style="font-size:14px">Últimas ventas</div>'+lista+'</div>';
  g('vp').onchange=calcTotal; g('vq').oninput=calcTotal;
  g('vef').oninput=calcTotal; g('vtr').oninput=calcTotal;
  g('vcond').onchange=function(){g('vmixto').style.display=this.value==='Mixto'?'block':'none';calcTotal();};
  g('btn-venta').onclick=guardarVenta;
}

function calcTotal(){
  var opt=g('vp')&&g('vp').options[g('vp').selectedIndex];
  var pr=parseFloat(opt&&opt.dataset.precio||0);
  var qty=parseFloat(g('vq')&&g('vq').value||0);
  var total=pr*qty;
  if(g('vtotal')) g('vtotal').textContent=fmt(total);
  if(g('vcond')&&g('vcond').value==='Mixto'){
    var ef=parseFloat(g('vef').value||0),tr=parseFloat(g('vtr').value||0);
    if(g('vcr')) g('vcr').value=Math.max(0,total-ef-tr).toFixed(2);
  }
}

function guardarVenta(){
  var f=g('vf').value,cli=g('vc'),emp=g('ve'),prod=g('vp'),qty=parseFloat(g('vq').value||0),cond=g('vcond').value;
  if(!f||!cli.value||!emp.value||!prod.value||!qty){showErr('av','Completa todos los campos.');return;}
  var pr=parseFloat(prod.options[prod.selectedIndex].dataset.precio||0);
  var total=pr*qty,saldo=0;
  if(cond==='Crédito') saldo=total;
  else if(cond==='Mixto'){var ef=parseFloat(g('vef').value||0),tr=parseFloat(g('vtr').value||0);saldo=Math.max(0,total-ef-tr);}
  var btn=g('btn-venta'); btn.disabled=true; btn.textContent='Guardando...';
  var vid=uid('V');
  var row=[vid,f,cli.value,cli.options[cli.selectedIndex].text,prod.options[prod.selectedIndex].text,qty,pr,total,cond,U.usuario,ts()];
  api({action:'appendRow',sheet:'Ventas',row:JSON.stringify(row)})
    .then(function(r){
      if(r.status==='ok'){
        if(saldo>0) api({action:'appendRow',sheet:'Deudas',row:JSON.stringify([uid('D'),cli.value,cli.options[cli.selectedIndex].text,vid,total,0,saldo,'pendiente',f])});
        D.ventas.push(row); showOk('av','✓ Venta guardada — '+fmt(total));
        g('vq').value=''; calcTotal();
      } else showErr('av','Error: '+(r.message||''));
    })
    .catch(function(){showErr('av','Error de conexión');})
    .finally(function(){btn.disabled=false;btn.textContent='Guardar venta';});
}

// GASTOS
function renderGastos(){
  if(U.rol==='vendedor'){g('content').innerHTML='<div class="loading">Sin acceso</div>';return;}
  g('content').innerHTML='<div class="stitle">Registrar gasto</div>'+
  '<div class="alert" id="ag"></div>'+
  '<div class="card">'+
  '<div class="grid2"><div class="field"><label>Fecha</label><input type="date" id="gf" value="'+hoy()+'"></div>'+
  '<div class="field"><label>Método</label><select id="gmet"><option>Efectivo</option><option>Transferencia</option><option>Cheque</option></select></div></div>'+
  '<div class="field"><label>Tipo</label><select id="gtipo">'+
  ['Combustible','Almuerzos','Proveedor','Adelanto empleado','Fondo diario','Mantenimiento','Salarios','Alquiler','Otros'].map(function(t){return '<option>'+t+'</option>';}).join('')+
  '</select></div>'+
  '<div class="field"><label>Descripción</label><input type="text" id="gdesc" placeholder="Detalle..."></div>'+
  '<div class="field"><label>Monto $</label><input type="number" id="gmonto" placeholder="0.00" step="0.01"></div>'+
  '<button class="btn btn-p" id="btn-gasto">Guardar gasto</button></div>'+
  '<div class="card"><div class="stitle" style="font-size:14px">Últimos gastos</div>'+
  (D.gastos.length?D.gastos.slice(-10).reverse().map(function(gg){
    return '<div class="litem"><div class="litem-info"><h4>'+gg[2]+' — '+gg[3]+'</h4><p>'+gg[1]+' · '+gg[5]+'</p></div><div class="litem-r"><div class="amt">'+fmt(gg[4])+'</div></div></div>';
  }).join(''):'<p style="color:var(--g400);text-align:center;padding:20px;font-size:13px">Sin gastos</p>')+'</div>';
  g('btn-gasto').onclick=guardarGasto;
}

function guardarGasto(){
  var f=g('gf').value,tipo=g('gtipo').value,desc=g('gdesc').value,monto=parseFloat(g('gmonto').value||0),met=g('gmet').value;
  if(!f||!monto||!desc){showErr('ag','Completa todos los campos.');return;}
  var row=[uid('G'),f,tipo,desc,monto,met,U.usuario,ts()];
  var btn=g('btn-gasto'); btn.disabled=true; btn.textContent='Guardando...';
  api({action:'appendRow',sheet:'Gastos',row:JSON.stringify(row)})
    .then(function(r){
      if(r.status==='ok'){D.gastos.push(row);showOk('ag','✓ Gasto guardado — '+fmt(monto));g('gmonto').value='';g('gdesc').value='';}
      else showErr('ag','Error: '+(r.message||''));
    })
    .finally(function(){btn.disabled=false;btn.textContent='Guardar gasto';});
}

// CLIENTES
function renderClientes(){
  g('content').innerHTML='<div class="stitle">Clientes ('+D.clientes.length+')</div>'+
  (U.rol!=='vendedor'?'<button class="btn btn-p btn-sm" id="btn-ncli" style="margin-bottom:12px">+ Nuevo cliente</button>':'')+
  D.clientes.map(function(cl){
    var saldo=D.deudas.filter(function(d){return d[1]==cl[0]&&d[7]!='pagado';}).reduce(function(s,d){return s+parseFloat(d[6]||0);},0);
    return '<div class="litem"><div class="litem-info"><h4>'+cl[1]+'</h4><p>'+(cl[2]||'Sin teléfono')+'</p></div>'+
    '<div class="litem-r"><div class="amt" style="color:'+(saldo>0?'var(--red)':'var(--green)')+'">'+fmt(saldo)+'</div>'+
    '<span class="badge '+(saldo>0?'b-red':'b-green')+'">'+(saldo>0?'Con deuda':'Al día')+'</span></div></div>';
  }).join('')+(D.clientes.length?'':'<div class="loading">Sin clientes</div>');
  var nb=g('btn-ncli'); if(nb) nb.onclick=function(){abrirModalCliente(null);};
}

function abrirModalCliente(cl){
  g('mcli-title').textContent=cl?'Editar':'Nuevo cliente';
  g('mcli-body').innerHTML=
  '<div class="field"><label>Nombre</label><input type="text" id="cl-nom" value="'+(cl?cl[1]:'')+'"></div>'+
  '<div class="field"><label>Teléfono</label><input type="text" id="cl-tel" value="'+(cl?cl[2]:'')+'"></div>'+
  '<div class="field"><label>Dirección</label><input type="text" id="cl-dir" value="'+(cl?cl[3]:'')+'"></div>'+
  '<div class="field"><label>Observaciones</label><textarea id="cl-obs" rows="2">'+(cl?cl[4]:'')+'</textarea></div>'+
  '<button class="btn btn-p" id="btn-svcli">Guardar</button>'+
  '<button class="btn btn-gray" id="btn-ccli" style="margin-top:8px">Cancelar</button>';
  g('modal-cliente').classList.remove('hidden');
  g('btn-ccli').onclick=function(){g('modal-cliente').classList.add('hidden');};
  g('btn-svcli').onclick=function(){
    var nom=g('cl-nom').value.trim();
    if(!nom){alert('Nombre requerido');return;}
    var row=[cl?cl[0]:uid('CL'),nom,g('cl-tel').value,g('cl-dir').value,g('cl-obs').value,0,'Activo'];
    api({action:'appendRow',sheet:'Clientes',row:JSON.stringify(row)}).then(function(r){
      if(r.status==='ok'){loadAll().then(function(){g('modal-cliente').classList.add('hidden');renderClientes();});}
    });
  };
}

// DEUDAS
function renderDeudas(){
  var pend=D.deudas.filter(function(d){return parseFloat(d[6]||0)>0;});
  var total=pend.reduce(function(s,d){return s+parseFloat(d[6]||0);},0);
  g('content').innerHTML='<div class="stitle">Deudas por cobrar</div>'+
  '<div class="mgrid">'+
  '<div class="mcard"><div class="mcard-l">Total deudas</div><div class="mcard-v">'+fmt(total)+'</div></div>'+
  '<div class="mcard" style="border-color:var(--red)"><div class="mcard-l">Clientes</div><div class="mcard-v">'+pend.length+'</div></div></div>'+
  pend.map(function(d,i){
    var ec={pendiente:'b-amber',atrasado:'b-red',pagado:'b-green'};
    return '<div class="litem"><div class="litem-info"><h4>'+d[2]+'</h4><p>'+d[3]+' · '+d[8]+'</p></div>'+
    '<div class="litem-r"><div class="amt">'+fmt(d[6])+'</div>'+
    '<span class="badge '+(ec[d[7]]||'b-gray')+'">'+d[7]+'</span><br>'+
    '<button class="btn-sm btn-green pagar-btn" data-idx="'+i+'" style="margin-top:5px">Pagar</button></div></div>';
  }).join('')+(pend.length?'':'<div class="loading">Sin deudas</div>');
  document.querySelectorAll('.pagar-btn').forEach(function(btn){
    btn.onclick=function(){abrirModalPago(pend[parseInt(this.dataset.idx)]);};
  });
}

function abrirModalPago(deuda){
  g('mpago-body').innerHTML=
  '<p style="font-size:13px;margin-bottom:10px">Cliente: <strong>'+deuda[2]+'</strong></p>'+
  '<p style="font-size:13px;margin-bottom:14px">Saldo: <strong style="color:var(--red)">'+fmt(deuda[6])+'</strong></p>'+
  '<div class="grid2"><div class="field"><label>Fecha</label><input type="date" id="pf" value="'+hoy()+'"></div>'+
  '<div class="field"><label>Método</label><select id="pmet"><option>Efectivo</option><option>Transferencia</option><option>Cheque</option></select></div></div>'+
  '<div class="field"><label>Monto $</label><input type="number" id="pmonto" value="'+parseFloat(deuda[6]).toFixed(2)+'" step="0.01"></div>'+
  '<button class="btn btn-p" id="btn-svpago">Registrar pago</button>'+
  '<button class="btn btn-gray" id="btn-cpago" style="margin-top:8px">Cancelar</button>';
  g('modal-pago').classList.remove('hidden');
  g('btn-cpago').onclick=function(){g('modal-pago').classList.add('hidden');};
  g('btn-svpago').onclick=function(){
    var monto=parseFloat(g('pmonto').value||0);
    if(!monto||monto<=0){alert('Monto inválido');return;}
    var prow=[uid('PG'),deuda[0],deuda[2],g('pf').value,monto,g('pmet').value,U.usuario,ts()];
    api({action:'appendRow',sheet:'Pagos_Deuda',row:JSON.stringify(prow)})
      .then(function(){return api({action:'getSheet',sheet:'Deudas'});})
      .then(function(r){
        if(r.status==='ok'){
          for(var i=1;i<r.data.length;i++){
            if(r.data[i][0]==deuda[0]){
              var np=parseFloat(deuda[5]||0)+monto;
              var ns=Math.max(0,parseFloat(deuda[4]||0)-np);
              return api({action:'updateRow',sheet:'Deudas',rowNum:i+1,row:JSON.stringify([deuda[0],deuda[1],deuda[2],deuda[3],deuda[4],np,ns,ns<=0?'pagado':'pendiente',deuda[8]])});
            }
          }
        }
      })
      .then(function(){loadAll().then(function(){g('modal-pago').classList.add('hidden');renderDeudas();});});
  };
}

// DASHBOARD
function renderDashboard(){
  if(U.rol!=='admin'){g('content').innerHTML='<div class="loading">Sin acceso</div>';return;}
  var tv=D.ventas.reduce(function(s,v){return s+parseFloat(v[7]||0);},0);
  var mes=hoy().substring(0,7);
  var vm=D.ventas.filter(function(v){return String(v[1]).substring(0,7)===mes;}).reduce(function(s,v){return s+parseFloat(v[7]||0);},0);
  var tg=D.gastos.reduce(function(s,gg){return s+parseFloat(gg[4]||0);},0);
  var td=D.deudas.filter(function(d){return parseFloat(d[6]||0)>0;}).reduce(function(s,d){return s+parseFloat(d[6]||0);},0);
  g('content').innerHTML='<div class="stitle">Dashboard</div>'+
  '<div class="mgrid">'+
  '<div class="mcard"><div class="mcard-l">Ventas totales</div><div class="mcard-v">'+fmt(tv)+'</div></div>'+
  '<div class="mcard"><div class="mcard-l">Ventas del mes</div><div class="mcard-v">'+fmt(vm)+'</div></div>'+
  '<div class="mcard" style="border-color:var(--red)"><div class="mcard-l">Gastos totales</div><div class="mcard-v">'+fmt(tg)+'</div></div>'+
  '<div class="mcard" style="border-color:var(--green)"><div class="mcard-l">Utilidad est.</div><div class="mcard-v" style="color:var(--green)">'+fmt(tv-tg)+'</div></div>'+
  '<div class="mcard" style="border-color:var(--amber)"><div class="mcard-l">Deudas x cobrar</div><div class="mcard-v" style="color:var(--amber)">'+fmt(td)+'</div></div>'+
  '<div class="mcard"><div class="mcard-l">Clientes</div><div class="mcard-v">'+D.clientes.length+'</div></div></div>';
}
</script>
</body>
</html>
