<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essential Water</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--p:#7C3AED;--pd:#5B21B6;--pl:#EDE9FE;--g50:#F9FAFB;--g200:#E5E7EB;--g400:#9CA3AF;--g600:#4B5563;--g800:#1F2937;--green:#10B981;--red:#EF4444;--amber:#F59E0B}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--g50);color:var(--g800);min-height:100vh}
.hidden{display:none!important}
#login-screen{min-height:100vh;background:linear-gradient(135deg,var(--pd),var(--p));display:flex;align-items:center;justify-content:center;padding:20px}
.lcard{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:360px;box-shadow:0 20px 40px rgba(0,0,0,.2)}
.logo{text-align:center;margin-bottom:28px}
.logo-circle{width:60px;height:60px;background:var(--p);border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center}
.logo-circle svg{width:28px;height:28px;fill:#fff}
.logo h1{font-size:20px;font-weight:700}
.logo p{font-size:12px;color:var(--g400);margin-top:3px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--g600);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border:1.5px solid var(--g200);border-radius:10px;font-size:15px;font-family:'Inter',sans-serif;background:#fff;color:var(--g800)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--p)}
.lerr{background:#FEE2E2;color:#991B1B;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;display:none}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-p{background:var(--p);color:#fff}
.btn-p:hover{background:var(--pd)}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.topbar{background:var(--p);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tb-left{display:flex;align-items:center;gap:8px}
.tb-logo{width:30px;height:30px;background:rgba(255,255,255,.2);border-radius:7px;display:flex;align-items:center;justify-content:center}
.tb-logo svg{width:16px;height:16px;fill:#fff}
.tb-title{font-size:14px;font-weight:700}
.tb-right{display:flex;align-items:center;gap:8px}
.ubadge{background:rgba(255,255,255,.2);border-radius:16px;padding:4px 10px;font-size:11px;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-out{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:7px;padding:6px 10px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif}
.content{padding:16px;max-width:580px;margin:0 auto}
.stitle{font-size:17px;font-weight:700;margin-bottom:14px}
.subtle{font-size:12px;color:var(--g400);margin:-8px 0 12px}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.tbox{background:var(--pl);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.tbox-l{font-size:12px;font-weight:600;color:var(--pd)}
.tbox-v{font-size:20px;font-weight:700;color:var(--pd)}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500;margin-bottom:12px;display:none}
.alert-ok{background:#D1FAE5;color:#065F46}
.alert-err{background:#FEE2E2;color:#991B1B}
.litem{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.05);display:flex;justify-content:space-between;align-items:center;gap:12px}
.litem-info h4{font-size:13px;font-weight:600}
.litem-info p{font-size:11px;color:var(--g400);margin-top:2px;line-height:1.35}
.litem-r{text-align:right}
.litem-r .amt{font-size:14px;font-weight:700;color:var(--pd)}
.badge{display:inline-block;padding:3px 9px;border-radius:16px;font-size:10px;font-weight:700}
.b-green{background:#D1FAE5;color:#065F46}.b-red{background:#FEE2E2;color:#991B1B}
.b-amber{background:#FEF3C7;color:#92400E}.b-purple{background:var(--pl);color:var(--pd)}
.b-gray{background:var(--g200);color:var(--g600)}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mcard{background:#fff;border-radius:12px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);border-left:3px solid var(--p)}
.mcard-l{font-size:10px;color:var(--g400);font-weight:500;text-transform:uppercase;margin-bottom:3px}
.mcard-v{font-size:19px;font-weight:700}
.mixto-box{background:var(--g50);border:1.5px dashed var(--p);border-radius:10px;padding:12px;margin-bottom:12px;display:none}
.mlabel{font-size:11px;font-weight:700;color:var(--pd);margin-bottom:8px;text-transform:uppercase}
.bnav{background:#fff;border-top:1px solid var(--g200);display:flex;position:sticky;bottom:0;z-index:100;overflow-x:auto}
.nitem{flex:1;min-width:72px;display:flex;flex-direction:column;align-items:center;padding:9px 4px;cursor:pointer;color:var(--g400);border:none;background:none;font-family:'Inter',sans-serif}
.nitem.active{color:var(--p)}
.nitem svg{width:20px;height:20px;margin-bottom:2px}
.nitem span{font-size:10px;font-weight:500}
.loading{text-align:center;padding:32px;color:var(--g400);font-size:13px}
.spin{width:28px;height:28px;border:3px solid var(--g200);border-top-color:var(--p);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:7px;width:auto;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600}
.btn-green{background:var(--green);color:#fff}
.btn-gray{background:var(--g200);color:var(--g800)}
.tabs-mini{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.tabmini{padding:10px;border:1px solid var(--g200);background:#fff;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer}
.tabmini.active{background:var(--pl);border-color:var(--p);color:var(--pd)}
.bar{height:8px;background:var(--g200);border-radius:999px;overflow:hidden;margin-top:6px}
.bar > span{display:block;height:100%;background:var(--p);border-radius:999px}
@media(min-width:600px){.content{padding:20px}}

.sale-lines{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}.sale-line{border:1px solid var(--g200);border-radius:12px;padding:10px;background:#fff}.sale-line-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.sale-line-title{font-size:11px;font-weight:700;color:var(--pd);text-transform:uppercase}.mini-btn{border:none;background:var(--g200);color:var(--g800);border-radius:8px;padding:8px 10px;font-size:12px;font-weight:700;cursor:pointer}.mini-btn.red{background:#FEE2E2;color:#991B1B}.row-actions{display:flex;gap:8px;flex-wrap:wrap}.note{font-size:11px;color:var(--g400)}
</style>
</head>
<body>

<div id="login-screen">
  <div class="lcard">
    <div class="logo">
      <div class="logo-circle"><svg viewBox="0 0 24 24"><path d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2C20 10.48 17.33 6.55 12 2z"/></svg></div>
      <h1>Essential Water</h1>
      <p>Sistema de control de ventas</p>
    </div>
    <div class="lerr" id="lerr"></div>
    <div class="field"><label>Usuario</label><input type="text" id="inp-user" placeholder="Tu usuario" autocomplete="username"></div>
    <div class="field"><label>Clave</label><input type="password" id="inp-pass" placeholder="6 dígitos" maxlength="6" autocomplete="current-password"></div>
    <button class="btn btn-p" id="btn-login">Ingresar</button>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-logo"><svg viewBox="0 0 24 24"><path d="M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2C20 10.48 17.33 6.55 12 2z"/></svg></div>
      <span class="tb-title">Essential Water</span>
    </div>
    <div class="tb-right">
      <span class="ubadge" id="ubadge">—</span>
      <button class="btn-out" id="btn-logout">Salir</button>
    </div>
  </div>
  <div class="content" id="content"><div class="loading"><div class="spin"></div>Cargando...</div></div>
  <nav class="bnav" id="bnav"></nav>
</div>

<div class="modal-ov hidden" id="modal-pago">
  <div class="modal"><h3>Registrar abono</h3><div id="mpago-body"></div></div>
</div>
<div class="modal-ov hidden" id="modal-cliente">
  <div class="modal"><h3 id="mcli-title">Nuevo cliente</h3><div id="mcli-body"></div></div>
</div>
<div class="modal-ov hidden" id="modal-prov">
  <div class="modal"><h3 id="mprov-title">Nuevo proveedor</h3><div id="mprov-body"></div></div>
</div>


<div class="modal-ov hidden" id="modal-sale">
  <div class="modal"><h3 id="msale-title">Editar venta</h3><div id="msale-body"></div></div>
</div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbwxyEIMLibvoUxwEiOP1VFpFwEpi0Jx2hD1hcZMlK6g0bZTixtefDJGB1SJderdfOcPJQ/exec';
var U = null;
var D = {
  ventas:[], clientes:[], gastos:[], empleados:[], productos:[], proveedores:[],
  pagos:[], pagosProv:[], cuentas:[], cxpResumen:[], vistaDeudas:'ventas', vistaCXP:'proveedores', currentTab:'ventas'
};
var GASTO_CATEGORIAS = ['Diesel','Gasolina','Almuerzos','Insumos Producción','Adelanto Empleado','Fondo Diario','Mantenimiento Planta','Salarios','Alquiler','Botellones','Botellitas 600 ml','Galones','Mantenimiento Vehículo','Otros'];

function g(id){return document.getElementById(id);} 
function fmt(n){return '$'+parseFloat(n||0).toFixed(2);} 
function hoy(){return new Date().toISOString().split('T')[0];}
function ts(){return new Date().toLocaleString('es');}
function uid(p){return p+'-'+Date.now().toString(36).toUpperCase()+Math.random().toString(36).slice(2,5).toUpperCase();}
function api(params){return fetch(API+'?'+new URLSearchParams(params)).then(function(r){return r.json();});}
function showErr(id,msg){var e=g(id);if(!e)return;e.textContent=msg;e.className='alert alert-err';e.style.display='block';setTimeout(function(){e.style.display='none';},4500);} 
function showOk(id,msg){var e=g(id);if(!e)return;e.textContent=msg;e.className='alert alert-ok';e.style.display='block';setTimeout(function(){e.style.display='none';},3500);} 
function roleLabel(rol){return rol==='admin'?'Admin':((rol==='supervisor' || rol==='super')?'Super':'Vendedor');}
function parseNum(v){return parseFloat(v||0)||0;}
function round2(n){ return Math.round((parseFloat(n||0)||0)*100)/100; }
function amountGreater(a,b){ return round2(a) - round2(b) > 0.000001; }
function canEditSales(){return U && (U.rol==='admin' || U.rol==='super' || U.rol==='supervisor');}
function parseSheetDate(v){
  if(v===null || v===undefined || v==='') return null;
  if(v instanceof Date && !isNaN(v)) return new Date(v.getFullYear(), v.getMonth(), v.getDate());
  if(typeof v === 'number'){
    if(v > 1000){ var ms = Math.round((v - 25569) * 86400 * 1000); var dnum = new Date(ms); return new Date(dnum.getUTCFullYear(), dnum.getUTCMonth(), dnum.getUTCDate()); }
    return null;
  }
  var s = String(v).trim(); if(!s) return null;
  s = s.replace(/\s+\d{1,2}:\d{2}(:\d{2})?.*$/, '');
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)){ var a=s.split('-'); return new Date(parseInt(a[0],10), parseInt(a[1],10)-1, parseInt(a[2],10)); }
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s)){ var p=s.split('/'); return new Date(parseInt(p[2],10), parseInt(p[1],10)-1, parseInt(p[0],10)); }
  var d = new Date(s); if(!isNaN(d)) return new Date(d.getFullYear(), d.getMonth(), d.getDate());
  return null;
}
function formatDateDisplay(v){ var d=parseSheetDate(v); return (!d||isNaN(d))?(v||''):d.toLocaleDateString('es-EC'); }
function rowUsable(v){ return v!==null && v!==undefined && String(v).trim()!=='' && String(v).trim().toUpperCase()!=='NULL'; }
function cleanRows(sheet, rows){
  if(!rows || !rows.length) return [];
  var kill = {
    'Ventas_Detalle':['VENTAS DETALLE','ID Venta'], 'Clientes':['CLIENTES','ID Cliente'], 'Empleados':['EMPLEADOS','ID Empleado'],
    'Productos':['PRODUCTOS','ID Producto'], 'Pagos':['PAGOS','ID Pago'], 'Egresos':['EGRESOS','ID Egreso'],
    'Cuentas_x_Cobrar':['CUENTAS POR COBRAR','ID Cliente'], 'Pagos_Proveedor':['ID_Pago','PAGOS_PROVEEDOR','PAGOS PROVEEDOR'],
    'Cuentas_x_Pagar':['ID_Proveedor','CUENTAS_X_PAGAR','CUENTAS POR PAGAR'], 'Proveedores':['ID_Proveedor','ID Proveedor','PROVEEDORES','ID proveedor']
  };
  return rows.filter(function(row){
    if(!row || !row.length || !rowUsable(row[0])) return false;
    var first=String(row[0]).trim(); if(first.indexOf('⬆')===0) return false;
    if(kill[sheet] && kill[sheet].indexOf(first)>=0) return false;
    return true;
  });
}
function getClienteById(id){ return D.clientes.find(function(c){ return c[0]===id; }) || null; }
function getEmpleadoById(id){ return D.empleados.find(function(e){ return e[0]===id; }) || null; }
function getProductoById(id){ return D.productos.find(function(p){ return p[0]===id; }) || null; }
function getProveedorById(id){ return D.proveedores.find(function(p){ return p[0]===id; }) || null; }
function inicioSemana(d){ var x=new Date(d); var day=x.getDay(); var diff=x.getDate()-day+(day===0?-6:1); x.setDate(diff); x.setHours(0,0,0,0); return x; }
function finSemana(d){ var x=inicioSemana(d); x.setDate(x.getDate()+6); x.setHours(23,59,59,999); return x; }
function inicioMes(d){ return new Date(d.getFullYear(),d.getMonth(),1,0,0,0,0); }
function finMes(d){ return new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59,999); }
function lockBtn(btn,text){ if(!btn) return false; if(btn.dataset.locked==='1') return false; btn.dataset.locked='1'; btn.dataset.originalText=btn.textContent; btn.disabled=true; if(text) btn.textContent=text; return true; }
function unlockBtn(btn){ if(!btn) return; btn.disabled=false; if(btn.dataset.originalText) btn.textContent=btn.dataset.originalText; btn.dataset.locked='0'; }
function reloadActiveTab(){ return loadAll().then(function(){ if(D.currentTab) showTab(D.currentTab); }); }
function closeModal(id){ g(id).classList.add('hidden'); }
function openModal(id){ g(id).classList.remove('hidden'); }
function filterRowsByPeriod(rows, idx, tipo){
  var now=new Date(), ini=null, fin=null;
  if(tipo==='dia'){ ini=new Date(now.getFullYear(),now.getMonth(),now.getDate(),0,0,0,0); fin=new Date(now.getFullYear(),now.getMonth(),now.getDate(),23,59,59,999); }
  else if(tipo==='semana'){ ini=inicioSemana(now); fin=finSemana(now); }
  else if(tipo==='mes'){ ini=inicioMes(now); fin=finMes(now); }
  else if(tipo==='mes_cerrado'){ var prev=new Date(now.getFullYear(),now.getMonth()-1,1); ini=inicioMes(prev); fin=finMes(prev); }
  return rows.filter(function(r){ if(tipo==='todo') return true; var d=parseSheetDate(r[idx]); return d && d>=ini && d<=fin; });
}

function getGroupedVentas(){
  var map={};
  D.ventas.forEach(function(r){
    var id=r[0]; if(!id) return;
    if(U && U.rol==='vendedor' && String(r[12]||'').trim()!==String(U.usuario||'').trim()) return;
    if(!map[id]) map[id]={id:id, fecha:r[1], clienteId:r[2], clienteNombre:r[3], empleadoId:r[4], total:0, saldo:0, usuario:r[12]||'', obs:r[11]||'', items:[], formas:{}, rows:[]};
    var line={row:r, productoId:r[5], productoNombre:(getProductoById(r[5])||[])[1]||r[5], qty:parseNum(r[6]), precio:parseNum(r[7]), total:parseNum(r[8]), forma:r[9]||'Contado', saldo:parseNum(r[10]), obs:r[11]||'', usuario:r[12]||''};
    map[id].items.push(line); map[id].rows.push(r); map[id].total += line.total; map[id].saldo += line.saldo; map[id].formas[line.forma]=1;
    if(!map[id].clienteNombre && r[3]) map[id].clienteNombre=r[3];
  });
  return Object.keys(map).map(function(k){
    var s=map[k], forms=Object.keys(s.formas); s.forma=forms.length===1?forms[0]:'Mixta';
    s.unidades=s.items.reduce(function(a,b){return a+b.qty;},0);
    return s;
  }).sort(function(a,b){ return (parseSheetDate(b.fecha)||0) - (parseSheetDate(a.fecha)||0); });
}
function getSaleById(id){ return getGroupedVentas().find(function(s){return s.id===id;}) || null; }
function calcGroupedSaldo(items){ return items.reduce(function(s,i){return s+parseNum(i.saldo);},0); }
function describeItems(items){
  return items.map(function(it){ return it.productoNombre+' x'+it.qty+(it.forma==='Regalías'?' (Regalía)':''); }).join(' · ');
}
function distributeSaldo(lines, saleSaldo){
  var active=lines.filter(function(x){ return parseNum(x.total)>0; });
  var total=active.reduce(function(s,x){return s+parseNum(x.total);},0);
  var left=saleSaldo; var out=[];
  for(var i=0;i<lines.length;i++){
    var l=lines[i], saldo=0;
    if(parseNum(l.total)>0 && total>0){
      if(i===lines.length-1){ saldo=Math.max(0, left); }
      else { saldo=+(saleSaldo*(parseNum(l.total)/total)).toFixed(2); left=+(left-saldo).toFixed(2); }
    }
    out.push(saldo<0?0:saldo);
  }
  // assign any rounding remainder to last positive line
  if(out.reduce(function(a,b){return a+b;},0)!==saleSaldo){
    var diff=+(saleSaldo - out.reduce(function(a,b){return a+b;},0)).toFixed(2);
    for(var j=out.length-1;j>=0;j--){ if(parseNum(lines[j].total)>0){ out[j]=+(out[j]+diff).toFixed(2); break; } }
  }
  return out;
}

function renderVentaLines(containerId, items, editable){
  var box=g(containerId); if(!box) return;
  box.innerHTML='';
  items.forEach(function(item, idx){
    var div=document.createElement('div'); div.className='sale-line';
    div.innerHTML='<div class="sale-line-top"><span class="sale-line-title">Producto '+(idx+1)+'</span>'+(editable?'<button class="mini-btn red" data-remove="'+idx+'">Quitar</button>':'')+'</div>'+
      '<div class="grid2"><div class="field"><label>Producto</label><select class="line-prod"><option value="">Selecciona...</option>'+D.productos.filter(function(p){return (p[4]||'Sí')!=='No';}).map(function(p){return '<option value="'+p[0]+'" '+(item.productoId===p[0]?'selected':'')+'>'+p[1]+'</option>';}).join('')+'</select></div>'+
      '<div class="field"><label>Tipo línea</label><select class="line-type"><option '+(item.tipo==='Venta'?'selected':'')+'>Venta</option><option '+(item.tipo==='Regalía'?'selected':'')+'>Regalía</option></select></div></div>'+
      '<div class="grid2"><div class="field"><label>Cantidad</label><input type="number" class="line-qty" min="0" step="1" value="'+(item.qty||0)+'"></div>'+
      '<div class="field"><label>Precio unitario</label><input type="number" class="line-price" min="0" step="0.01" value="'+(item.precio||0)+'"></div></div>'+
      '<div class="note">Total línea: <strong class="line-total">'+fmt(parseNum(item.qty)*parseNum(item.precio))+'</strong></div>';
    box.appendChild(div);
  });
  if(editable){
    box.querySelectorAll('[data-remove]').forEach(function(btn){ btn.onclick=function(){ items.splice(parseInt(btn.dataset.remove,10),1); if(!items.length) items.push({productoId:'', qty:1, precio:0, tipo:'Venta'}); renderVentaLines(containerId, items, editable); recalcVentaBuilder(); }; });
    box.querySelectorAll('.line-type').forEach(function(sel, idx){ sel.onchange=function(){ items[idx].tipo=this.value; if(this.value==='Regalía' && parseNum(items[idx].precio)===0) box.querySelectorAll('.line-price')[idx].value='0'; recalcVentaBuilder(); }; });
    box.querySelectorAll('.line-prod').forEach(function(sel, idx){ sel.onchange=function(){ items[idx].productoId=this.value; recalcVentaBuilder(); }; });
    box.querySelectorAll('.line-qty').forEach(function(inp, idx){ inp.oninput=function(){ items[idx].qty=parseNum(this.value); recalcVentaBuilder(); }; });
    box.querySelectorAll('.line-price').forEach(function(inp, idx){ inp.oninput=function(){ items[idx].precio=parseNum(this.value); recalcVentaBuilder(); }; });
  }
}
function collectVentaBuilderItems(containerId){
  var box=g(containerId), items=[];
  if(!box) return items;
  box.querySelectorAll('.sale-line').forEach(function(line){
    var prod=line.querySelector('.line-prod').value;
    var tipo=line.querySelector('.line-type').value;
    var qty=parseNum(line.querySelector('.line-qty').value);
    var precio=parseNum(line.querySelector('.line-price').value);
    if(prod && qty>0){ items.push({productoId:prod, qty:qty, precio:precio, tipo:tipo}); }
  });
  return items;
}
function recalcVentaBuilder(){
  var items=collectVentaBuilderItems('venta-lines');
  var total=0, units=0;
  var box=g('venta-lines');
  if(box){ box.querySelectorAll('.sale-line').forEach(function(line){ var qty=parseNum(line.querySelector('.line-qty').value), price=parseNum(line.querySelector('.line-price').value); line.querySelector('.line-total').textContent=fmt(qty*price); }); }
  items.forEach(function(i){ total += i.qty*i.precio; units += i.qty; });
  if(g('vtotal')) g('vtotal').textContent=fmt(total);
  if(g('vunits')) g('vunits').textContent=units+' und.';
  if(g('vcond')){
    var forma=g('vcond').value;
    if(g('vmixto')) g('vmixto').style.display=forma==='Mixto'?'block':'none';
    var saldo=0;
    if(forma==='Crédito') saldo=total;
    else if(forma==='Mixto') saldo=Math.max(0,total-parseNum(g('vef').value)-parseNum(g('vtr').value)-parseNum(g('vch').value));
    if(g('vcr')) g('vcr').value=saldo.toFixed(2);
  }
}
function buildVentaRows(saleId, fecha, clienteId, clienteNombre, empleadoId, formaPagoGlobal, obs, items){
  var totalSale=items.reduce(function(s,i){return s+(i.qty*i.precio);},0);
  var creditoSale=0;
  if(formaPagoGlobal==='Crédito') creditoSale=totalSale;
  else if(formaPagoGlobal==='Mixto') creditoSale=Math.max(0,totalSale-parseNum(g('vef')&&g('vef').value)-parseNum(g('vtr')&&g('vtr').value)-parseNum(g('vch')&&g('vch').value));
  var nonGift = items.map(function(i){ return {total:i.qty*i.precio, gift:(i.tipo==='Regalía' || formaPagoGlobal==='Regalías')}; });
  var creditBase=items.map(function(i){ return {total:(i.tipo==='Regalía' || formaPagoGlobal==='Regalías')?0:(i.qty*i.precio)}; });
  var saldos = distributeSaldo(creditBase, creditoSale);
  return items.map(function(i,idx){
    var lineTotal=+(i.qty*i.precio).toFixed(2);
    var lineForma = (i.tipo==='Regalía' || formaPagoGlobal==='Regalías') ? 'Regalías' : formaPagoGlobal;
    var lineObs = (i.tipo==='Regalía'?'[Regalía] ':'') + (obs||'');
    return [saleId, fecha, clienteId, clienteNombre, empleadoId, i.productoId, i.qty, i.precio, lineTotal, lineForma, saldos[idx], lineObs, U.usuario||''];
  });
}

      return newRows.reduce(function(chain,row,idx){ return chain.then(function(){ if(idx<positions.length) return updateRowByIdx(positions[idx], row); return api({action:'appendRow',sheet:'Ventas_Detalle',row:JSON.stringify(row)}).then(function(res){ if(res.status!=='ok') throw new Error(res.message||'No se pudo agregar línea'); }); }); }, Promise.resolve())
      .then(function(){
        // nullify extra old rows if any

      });
    }).then(function(){ return loadAll(); }).then(function(){ closeModal('modal-sale'); reloadActiveTab(); })
    .catch(function(err){ showErr('aedit','Error: '+(err.message||'')); })
    .finally(function(){ unlockBtn(btn); });
  };

function isDeletedSaleRow(r){
  var obs = String((r && r[11]) || '').toUpperCase();
  return obs.indexOf('[ELIMINADA]') >= 0;
}
function getActiveVentaRows(){
  return (D.ventas || []).filter(function(r){
    if(!r || !r[0] || isDeletedSaleRow(r)) return false;
    if(U && U.rol==='vendedor' && String(r[12]||'').trim()!==String(U.usuario||'').trim()) return false;
    return true;
  });
}
function filterRowsByDateRange(rows, idx, fromStr, toStr){
  var ini = fromStr ? parseSheetDate(fromStr) : null;
  var fin = toStr ? parseSheetDate(toStr) : null;
  if(fin) fin = new Date(fin.getFullYear(), fin.getMonth(), fin.getDate(), 23,59,59,999);
  return (rows||[]).filter(function(r){
    var d = parseSheetDate(r[idx]);
    if(!d) return false;
    if(ini && d < ini) return false;
    if(fin && d > fin) return false;
    return true;
  });
}
function getGroupedVentas(){
  var map={};
  getActiveVentaRows().forEach(function(r){
    var id=r[0]; if(!id) return;
    if(!map[id]) map[id]={id:id, fecha:r[1], clienteId:r[2], clienteNombre:r[3], empleadoId:r[4], total:0, saldo:0, usuario:r[12]||'', obs:r[11]||'', items:[], formas:{}, rows:[]};

function buildDistributedItemSaldos(sale, newGroupSaldo){
  var items = sale.items || [];
  var current = items.map(function(i){ return round2(i.saldo); });
  var currentSum = round2(current.reduce(function(a,b){ return a+b; },0));
  var target = round2(Math.max(0, newGroupSaldo));
  var out=[], rem=target;
  for(var i=0;i<items.length;i++){
    var val=0;
    if(currentSum>0){
      if(i===items.length-1) val=round2(Math.max(0, rem));
      else { val=round2(target * (current[i]/currentSum)); rem=round2(rem-val); }

    out.push(val);
  }
  return out;
}

    for(var i=0;i<ordered.length && remaining>0;i++){
      var item=ordered[i];
      if(item.saldoWork<=0) continue;
      var apply = round2(Math.min(item.saldoWork, remaining));
      if(apply<=0) continue;
      item.saldoWork = round2(item.saldoWork - apply);
      remaining = round2(remaining - apply);
      apps.push({
        id: uid('AP'), pagoId:pagoId, fechaPago:payDate, clienteId:clienteId, cliente:clienteNombre,
        ventaId:item.sale.id, fechaVenta:item.sale.fecha, tipoPago:tipo, monto:apply,
        detalleRegalia: (tipo==='Regalias' ? (detailRegalia||'') : ''), usuario:(U && U.usuario)||'', timestamp:ts()
      });
    }
    if(remaining>0.000001) throw new Error('No se pudo aplicar completamente el componente '+tipo+' del abono.');
  });
  return {applications:apps, salesState:ordered};
}

function updateSalesBalancesInSheet(states){
  if(!states || !states.length) return Promise.resolve();
  return api({action:'getSheet',sheet:'Ventas_Detalle'}).then(function(r){
    if(r.status!=='ok') throw new Error('No se pudo leer Ventas_Detalle');
    var rows = r.data || [];
    var posBySale = {};
    rows.forEach(function(row,idx){ if(row && row[0]) { (posBySale[row[0]] = posBySale[row[0]] || []).push(idx+1); } });
    return states.reduce(function(chain,state){
      return chain.then(function(){
        var sale=state.sale, positions=posBySale[sale.id] || [];
        if(!positions.length) return Promise.resolve();
        var dist = buildDistributedItemSaldos(sale, state.saldoWork);
        return positions.reduce(function(ch,rowNum,idx){
          return ch.then(function(){
            var old=sale.rows[idx];
            if(!old) return Promise.resolve();
            var updated=[old[0],old[1],old[2],old[3],old[4],old[5],old[6],old[7],old[8],old[9],dist[idx],old[11]||'',old[12]||''];
            return api({action:'updateRow',sheet:'Ventas_Detalle',rowNum:rowNum,row:JSON.stringify(updated)}).then(function(rr){ if(rr.status && rr.status!=='ok') throw new Error(rr.message||'No se actualizó una venta'); });
          });
        }, Promise.resolve());
      });
    }, Promise.resolve());
  });
}

  });
  var arr=Object.keys(daily).map(function(k){return daily[k];}).sort(function(a,b){ var da=parseSheetDate(a.fecha), db=parseSheetDate(b.fecha); return (db-da) || a.cliente.localeCompare(b.cliente); });
  g('rep-rango-body').innerHTML = '<div class="card" style="padding:12px"><div class="stitle" style="font-size:14px">Detalle por día y cliente</div>'+(arr.length?arr.map(function(x){ return '<div class="litem"><div class="litem-info"><h4>'+x.cliente+'</h4><p>'+x.fecha+' · '+x.unidades+' und.</p></div><div class="litem-r"><div class="amt">'+fmt(x.total)+'</div></div></div>'; }).join(''):'<div class="loading" style="padding:10px">Sin datos en este rango</div>')+'</div>';
}
</script>
</body>
